<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#2563eb" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-title" content="課題管理" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <link rel="manifest" href="./manifest.json" />
  <link rel="icon" type="image/png" sizes="192x192" href="./icons/icon-192.png" />
  <link rel="apple-touch-icon" sizes="180x180" href="./icons/apple-touch-icon.png" />
  <title>課題・カレンダー管理アプリ</title>
  <style>
    :root {
      --bg: #f4f7fb;
      --card: #ffffff;
      --text: #1f2937;
      --muted: #6b7280;
      --main: #2563eb;
      --main-dark: #1d4ed8;
      --danger: #dc2626;
      --success: #16a34a;
      --warning: #f59e0b;
      --border: #e5e7eb;
      --shadow: 0 10px 25px rgba(15, 23, 42, 0.08);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    header {
      background: linear-gradient(135deg, #2563eb, #4f46e5);
      color: white;
      padding: 28px 20px;
      text-align: center;
    }

    header h1 {
      margin: 0;
      font-size: 28px;
    }

    header p {
      margin: 8px 0 0;
      opacity: 0.9;
    }

    nav {
      position: sticky;
      top: 0;
      z-index: 10;
      background: white;
      display: flex;
      gap: 8px;
      padding: 10px;
      border-bottom: 1px solid var(--border);
      overflow-x: auto;
    }

    nav button {
      border: none;
      background: #eef2ff;
      color: #3730a3;
      padding: 10px 14px;
      border-radius: 999px;
      font-weight: 700;
      cursor: pointer;
      white-space: nowrap;
    }

    nav button.active {
      background: var(--main);
      color: white;
    }

    main {
      max-width: 1100px;
      margin: 0 auto;
      padding: 20px;
    }

    section {
      display: none;
    }

    section.active {
      display: block;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(230px, 1fr));
      gap: 16px;
      margin-bottom: 20px;
    }

    .card {
      background: var(--card);
      border-radius: 18px;
      padding: 18px;
      box-shadow: var(--shadow);
      border: 1px solid var(--border);
    }

    .card h2, .card h3 {
      margin-top: 0;
    }

    .number {
      font-size: 30px;
      font-weight: 800;
      margin: 8px 0;
    }

    .muted {
      color: var(--muted);
      font-size: 14px;
    }

    form {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(170px, 1fr));
      gap: 10px;
      margin-bottom: 16px;
    }

    input, select, textarea {
      width: 100%;
      padding: 11px;
      border-radius: 12px;
      border: 1px solid var(--border);
      font-size: 15px;
      background: white;
    }

    textarea {
      min-height: 46px;
      resize: vertical;
    }

    button.primary {
      border: none;
      background: var(--main);
      color: white;
      padding: 11px 14px;
      border-radius: 12px;
      font-weight: 800;
      cursor: pointer;
    }

    button.primary:hover {
      background: var(--main-dark);
    }

    button.delete {
      border: none;
      background: #fee2e2;
      color: var(--danger);
      padding: 8px 10px;
      border-radius: 10px;
      cursor: pointer;
      font-weight: 700;
    }

    button.done {
      border: none;
      background: #dcfce7;
      color: var(--success);
      padding: 8px 10px;
      border-radius: 10px;
      cursor: pointer;
      font-weight: 700;
    }

    .item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      padding: 12px 0;
      border-bottom: 1px solid var(--border);
    }

    .item:last-child {
      border-bottom: none;
    }

    .item-title {
      font-weight: 800;
    }

    .actions {
      display: flex;
      gap: 8px;
      flex-shrink: 0;
    }

    .badge {
      display: inline-block;
      padding: 4px 8px;
      border-radius: 999px;
      background: #f3f4f6;
      font-size: 12px;
      color: #374151;
      margin-right: 4px;
      margin-top: 4px;
    }

    .high {
      background: #fee2e2;
      color: var(--danger);
    }

    .middle {
      background: #fef3c7;
      color: #92400e;
    }

    .low {
      background: #dcfce7;
      color: var(--success);
    }

    .completed {
      opacity: 0.55;
      text-decoration: line-through;
    }

    .bar-wrap {
      background: #e5e7eb;
      height: 12px;
      border-radius: 999px;
      overflow: hidden;
      margin-top: 8px;
    }

    .bar {
      height: 100%;
      width: 0%;
      background: var(--main);
      transition: 0.3s;
    }

    .danger-text {
      color: var(--danger);
      font-weight: 800;
    }

    .success-text {
      color: var(--success);
      font-weight: 800;
    }

    .footer-tools {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 16px;
    }

    .secondary {
      border: none;
      background: #e5e7eb;
      color: #374151;
      padding: 10px 12px;
      border-radius: 12px;
      cursor: pointer;
      font-weight: 700;
    }

    .management-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 16px;
      margin-bottom: 20px;
    }

    .manager-panel {
      background: #f8fafc;
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 14px;
    }

    .manager-panel h3 {
      margin: 0 0 12px;
    }

    .subject-tools,
    .template-tools {
      display: grid;
      grid-template-columns: minmax(140px, 1fr) minmax(120px, auto) auto;
      gap: 10px;
      margin: 14px 0 18px;
    }

    .template-tools {
      grid-template-columns: minmax(180px, 1fr) auto;
    }

    .subject-list,
    .template-list {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 18px;
    }

    .subject-chip,
    .template-chip {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 7px 10px;
      border-radius: 999px;
      background: #eef2ff;
      color: #3730a3;
      font-size: 13px;
      font-weight: 800;
    }

    .template-chip {
      background: #ecfdf5;
      color: #166534;
    }

    .subject-chip button,
    .template-chip button {
      border: none;
      background: transparent;
      color: #4338ca;
      cursor: pointer;
      font-weight: 900;
      padding: 0 2px;
    }

    .template-chip button {
      color: #15803d;
    }

    .form-card {
      border-top: 1px solid var(--border);
      padding-top: 16px;
    }

    .form-title-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 12px;
    }

    .form-title-row h3 {
      margin: 0;
    }

    .form-wide {
      grid-column: 1 / -1;
    }

    .hidden {
      display: none;
    }

    .task-card {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 14px;
      padding: 14px 0;
      border-bottom: 1px solid var(--border);
    }

    .task-card:last-child {
      border-bottom: none;
    }

    .task-card.completed-task-card {
      opacity: 0.62;
    }

    .task-card.completed-task-card .item-title,
    .item.completed-task-card .item-title {
      text-decoration: line-through;
    }

    .task-main {
      min-width: 0;
    }

    .task-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-top: 8px;
    }

    .memo {
      margin: 8px 0 0;
      color: #4b5563;
      overflow-wrap: anywhere;
      line-height: 1.5;
    }

    button.edit {
      border: none;
      background: #dbeafe;
      color: var(--main-dark);
      padding: 8px 10px;
      border-radius: 10px;
      cursor: pointer;
      font-weight: 700;
    }

    .calendar-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 16px;
    }

    .calendar-title {
      font-size: 26px;
      font-weight: 900;
    }

    .calendar-controls {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: flex-end;
    }

    .calendar-summary {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      gap: 10px;
      margin-bottom: 16px;
    }

    .summary-box {
      background: #f8fafc;
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 12px;
    }

    .summary-box strong {
      display: block;
      font-size: 22px;
      margin-top: 4px;
    }

    .calendar-grid {
      display: grid;
      grid-template-columns: repeat(7, minmax(0, 1fr));
      border: 1px solid var(--border);
      border-radius: 14px;
      overflow: hidden;
      background: white;
    }

    .weekday,
    .calendar-day {
      border-right: 1px solid var(--border);
      border-bottom: 1px solid var(--border);
    }

    .weekday:nth-child(7n),
    .calendar-day:nth-child(7n) {
      border-right: none;
    }

    .weekday {
      background: #f8fafc;
      color: #475569;
      padding: 10px 8px;
      text-align: center;
      font-size: 13px;
      font-weight: 900;
    }

    .weekday.sun {
      color: var(--danger);
    }

    .weekday.sat {
      color: var(--main);
    }

    .calendar-day {
      min-height: 128px;
      padding: 8px;
      background: white;
    }

    .calendar-day.empty {
      background: #f8fafc;
    }

    .calendar-day.today {
      background: #eff6ff;
      box-shadow: inset 0 0 0 2px var(--main);
    }

    .date-number {
      display: flex;
      justify-content: space-between;
      align-items: center;
      min-height: 22px;
      color: #475569;
      font-size: 13px;
      font-weight: 900;
      margin-bottom: 6px;
    }

    .today-label {
      color: white;
      background: var(--main);
      border-radius: 999px;
      padding: 2px 6px;
      font-size: 11px;
    }

    .calendar-task {
      display: block;
      border: 1px solid var(--border);
      border-left: 5px solid var(--main);
      border-radius: 8px;
      background: #ffffff;
      padding: 7px;
      margin-top: 6px;
      text-align: left;
      cursor: pointer;
      width: 100%;
    }

    .calendar-task.high {
      border-left-color: var(--danger);
    }

    .calendar-task.middle {
      border-left-color: var(--warning);
    }

    .calendar-task.low {
      border-left-color: var(--success);
    }

    .calendar-task.completed-task {
      opacity: 0.55;
    }

    .calendar-task.completed-task .calendar-task-title {
      text-decoration: line-through;
    }

    .calendar-task-title {
      display: block;
      color: var(--text);
      font-size: 13px;
      font-weight: 900;
      line-height: 1.35;
      overflow-wrap: anywhere;
    }

    .calendar-task-meta {
      color: var(--muted);
      display: block;
      font-size: 11px;
      line-height: 1.4;
      margin-top: 2px;
      overflow-wrap: anywhere;
    }

    .calendar-list {
      margin-top: 16px;
    }

    .calendar-list h3 {
      margin-bottom: 6px;
    }

    @media (max-width: 600px) {
      header h1 {
        font-size: 23px;
      }

      main {
        padding: 14px;
      }

      .item {
        align-items: flex-start;
        flex-direction: column;
      }

      .actions {
        width: 100%;
      }

      .subject-tools,
      .template-tools,
      .calendar-head {
        grid-template-columns: 1fr;
        flex-direction: column;
        align-items: stretch;
      }

      .task-card {
        grid-template-columns: 1fr;
      }

      .actions button {
        flex: 1;
        min-height: 42px;
      }

      .calendar-controls {
        justify-content: stretch;
      }

      .calendar-controls button {
        flex: 1;
      }

      .calendar-grid {
        display: block;
        border-radius: 12px;
      }

      .weekday {
        display: none;
      }

      .calendar-day {
        min-height: auto;
        border-right: none;
      }

      .calendar-day.empty {
        display: none;
      }
    }
  </style>
</head>
<body>
  <header>
    <h1>課題・カレンダー管理アプリ</h1>
    <p>課題の締切を登録して、カレンダーで確認</p>
  </header>

  <nav>
    <button class="tab active" onclick="showPage('taskPage', this)">課題</button>
    <button class="tab" onclick="showPage('calendarPage', this)">カレンダー</button>
  </nav>

  <main>
    <section id="taskPage" class="active">
      <div class="card">
        <h2>課題管理</h2>
        <div class="management-grid">
          <div class="manager-panel">
            <h3>教科登録</h3>
            <div class="subject-tools">
              <input id="newSubjectName" type="text" placeholder="教科名 例: 英語" onkeydown="addSubjectOnEnter(event)" />
              <select id="newSubjectDueDay" aria-label="提出曜日">
                <option value="0">日曜日</option>
                <option value="1" selected>月曜日</option>
                <option value="2">火曜日</option>
                <option value="3">水曜日</option>
                <option value="4">木曜日</option>
                <option value="5">金曜日</option>
                <option value="6">土曜日</option>
              </select>
              <button class="primary" type="button" onclick="addSubject()">登録</button>
            </div>
            <div id="subjectList" class="subject-list"></div>
          </div>
          <div class="manager-panel">
            <h3>課題名テンプレート</h3>
            <div class="template-tools">
              <input id="newTemplateName" type="text" placeholder="例: レポート" onkeydown="addTemplateOnEnter(event)" />
              <button class="primary" type="button" onclick="addTemplate()">追加</button>
            </div>
            <div id="templateList" class="template-list"></div>
          </div>
        </div>
        <div class="form-card">
          <div class="form-title-row">
            <h3 id="taskFormTitle">課題追加</h3>
            <button id="cancelEditButton" class="secondary hidden" type="button" onclick="cancelEdit()">編集をやめる</button>
          </div>
          <form id="taskForm" onsubmit="saveTask(event)">
            <select id="taskSubject" required onchange="handleSubjectChange()"></select>
            <select id="taskTitleSelect" required onchange="handleTitleSelectChange()"></select>
            <input id="taskTitleOther" class="hidden" type="text" placeholder="課題名を入力" />
            <input id="taskDeadline" type="date" required />
            <select id="taskPriority">
              <option value="high">優先度：高</option>
              <option value="middle">優先度：中</option>
              <option value="low">優先度：低</option>
            </select>
            <textarea id="taskMemo" class="form-wide" placeholder="メモ 例: 第8回の内容"></textarea>
            <button id="taskSubmitButton" class="primary" type="submit">追加</button>
          </form>
        </div>
        <div id="taskList"></div>
      </div>
    </section>

    <section id="calendarPage">
      <div class="card">
        <div class="calendar-head">
          <div class="calendar-title" id="calendarTitle"></div>
          <div class="calendar-controls">
            <button class="secondary" onclick="moveCalendarMonth(-1)">前の月</button>
            <button class="secondary" onclick="moveCalendarMonth(0)">今月</button>
            <button class="secondary" onclick="moveCalendarMonth(1)">次の月</button>
          </div>
        </div>
        <div class="calendar-summary">
          <div class="summary-box">
            <span class="muted">今月の課題</span>
            <strong id="calendarMonthCount">0件</strong>
          </div>
          <div class="summary-box">
            <span class="muted">未完了</span>
            <strong id="calendarMonthUnfinished">0件</strong>
          </div>
          <div class="summary-box">
            <span class="muted">期限切れ</span>
            <strong id="calendarMonthOverdue">0件</strong>
          </div>
        </div>
        <div id="calendarGrid" class="calendar-grid"></div>
        <div class="calendar-list">
          <h3>近い締切</h3>
          <div id="upcomingTaskList"></div>
        </div>
      </div>
    </section>
  </main>

  <script>
    const DEFAULT_TEMPLATES = [
      "レポート",
      "小テスト",
      "予習",
      "復習",
      "プログラミング課題",
      "発表準備",
      "感想文",
      "スライド作成"
    ];
    const weekdays = ["日", "月", "火", "水", "木", "金", "土"];
    const weekdayLabels = ["日曜日", "月曜日", "火曜日", "水曜日", "木曜日", "金曜日", "土曜日"];
    const todayString = formatDateInput(new Date());

    let subjects = loadSubjects();
    let taskTemplates = loadTaskTemplates();
    let tasks = loadTasks();
    let editingTaskId = null;
    let visibleCalendarYear = new Date().getFullYear();
    let visibleCalendarMonth = new Date().getMonth();

    migrateOldData();
    removeExpiredTasks();
    saveAll();

    function saveAll() {
      localStorage.setItem("subjects", JSON.stringify(subjects));
      localStorage.setItem("taskTemplates", JSON.stringify(taskTemplates));
      localStorage.setItem("tasks", JSON.stringify(tasks));
      localStorage.removeItem("registeredSubjects");
    }

    function loadArray(key) {
      try {
        const value = JSON.parse(localStorage.getItem(key));
        return Array.isArray(value) ? value : [];
      } catch {
        return [];
      }
    }

    function loadSubjects() {
      return loadArray("subjects")
        .map(subject => ({
          id: String(subject.id || createId()),
          name: String(subject.name || "").trim(),
          dueDay: Number(subject.dueDay)
        }))
        .filter(subject => subject.name && subject.dueDay >= 0 && subject.dueDay <= 6);
    }

    function loadTaskTemplates() {
      const saved = localStorage.getItem("taskTemplates");
      const templates = saved === null
        ? DEFAULT_TEMPLATES.map(name => ({ id: createId(), name }))
        : loadArray("taskTemplates");

      return templates
        .map(template => ({
          id: String(template.id || createId()),
          name: String(template.name || "").trim()
        }))
        .filter(template => template.name);
    }

    function loadTasks() {
      return loadArray("tasks")
        .map(task => normalizeTask(task))
        .filter(task => task.title && task.dueDate);
    }

    function migrateOldData() {
      const oldSubjectNames = loadArray("registeredSubjects")
        .map(name => String(name || "").trim())
        .filter(Boolean);
      const legacyTaskSubjects = loadArray("tasks")
        .map(task => String(task.subject || "").trim())
        .filter(Boolean);
      const names = [...oldSubjectNames, ...legacyTaskSubjects];

      names.forEach(name => {
        if (!subjects.some(subject => subject.name === name)) {
          subjects.push({ id: createId(), name, dueDay: 1 });
        }
      });

      tasks = loadArray("tasks")
        .map(task => normalizeTask(task))
        .filter(task => task.title && task.dueDate);
    }

    function normalizeTask(task) {
      const oldSubjectName = String(task.subject || "").trim();
      const matchedSubject = oldSubjectName
        ? subjects.find(subject => subject.name === oldSubjectName)
        : null;

      return {
        id: String(task.id || createId()),
        subjectId: String(task.subjectId || matchedSubject?.id || ""),
        title: String(task.title || "").trim(),
        dueDate: String(task.dueDate || task.deadline || ""),
        priority: normalizePriority(task.priority),
        memo: String(task.memo || "").trim(),
        completed: task.completed ?? false
      };
    }

    function createId() {
      return `id-${Date.now()}-${Math.random().toString(36).slice(2, 9)}`;
    }

    function showPage(pageId, button) {
      document.querySelectorAll("section").forEach(section => section.classList.remove("active"));
      document.getElementById(pageId).classList.add("active");

      document.querySelectorAll(".tab").forEach(tab => tab.classList.remove("active"));
      button.classList.add("active");

      renderAll();
    }

    function formatDateInput(date) {
      const year = date.getFullYear();
      const month = String(date.getMonth() + 1).padStart(2, "0");
      const day = String(date.getDate()).padStart(2, "0");
      return `${year}-${month}-${day}`;
    }

    function buildDateString(year, month, day) {
      return `${year}-${String(month + 1).padStart(2, "0")}-${String(day).padStart(2, "0")}`;
    }

    function parseDateInput(value) {
      const [year, month, day] = String(value || "").split("-").map(Number);
      return new Date(year, month - 1, day);
    }

    function escapeHtml(value) {
      return String(value ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function jsArgument(value) {
      return escapeHtml(JSON.stringify(value));
    }

    function removeExpiredTasks() {
      const before = tasks.length;
      tasks = tasks.filter(task => !task.dueDate || task.dueDate >= todayString);
      if (tasks.length !== before) saveAll();
    }

    function addSubject() {
      const nameInput = document.getElementById("newSubjectName");
      const dueDayInput = document.getElementById("newSubjectDueDay");
      const name = nameInput.value.trim();
      const dueDay = Number(dueDayInput.value);
      if (!name) return;

      if (subjects.some(subject => subject.name === name)) {
        alert("同じ名前の教科がすでに登録されています。");
        return;
      }

      const subject = { id: createId(), name, dueDay };
      subjects.push(subject);
      subjects.sort((a, b) => a.name.localeCompare(b.name, "ja"));
      nameInput.value = "";
      saveAll();
      renderAll();
      renderSubjectOptions(subject.id);
      document.getElementById("taskSubject").value = subject.id;
      handleSubjectChange();
    }

    function addSubjectOnEnter(event) {
      if (event.key !== "Enter") return;

      event.preventDefault();
      addSubject();
    }

    function deleteSubject(id) {
      const subject = subjects.find(item => item.id === id);
      if (!subject) return;

      const ok = confirm(`${subject.name} を登録教科から削除しますか？登録済みの課題はそのまま残ります。`);
      if (!ok) return;

      subjects = subjects.filter(item => item.id !== id);
      saveAll();
      renderAll();
    }

    function renderSubjectManager() {
      const list = document.getElementById("subjectList");

      if (subjects.length === 0) {
        list.innerHTML = "<p class='muted'>教科と提出曜日を登録すると、課題追加で選べるようになります。</p>";
        return;
      }

      list.innerHTML = subjects.map(subject => `
        <span class="subject-chip">
          ${escapeHtml(subject.name)}・${weekdayLabels[subject.dueDay]}
          <button type="button" onclick='deleteSubject(${jsArgument(subject.id)})'>×</button>
        </span>
      `).join("");
    }

    function renderSubjectOptions(selectedSubjectId = "") {
      const select = document.getElementById("taskSubject");
      const currentValue = selectedSubjectId || select.value;
      const missingSelected = currentValue && !subjects.some(subject => subject.id === currentValue);
      const options = subjects.length
        ? subjects.map(subject => (
          `<option value="${escapeHtml(subject.id)}">${escapeHtml(subject.name)}（${weekdayLabels[subject.dueDay]}）</option>`
        ))
        : ["<option value=''>教科を登録してください</option>"];

      if (missingSelected) {
        options.unshift(`<option value="${escapeHtml(currentValue)}">削除済みの教科</option>`);
      }

      select.innerHTML = options.join("");
      if (currentValue) select.value = currentValue;
      if (!select.value && subjects[0]) select.value = subjects[0].id;
    }

    function addTemplate() {
      const input = document.getElementById("newTemplateName");
      const name = input.value.trim();
      if (!name) return;

      if (taskTemplates.some(template => template.name === name)) {
        alert("同じ名前のテンプレートがすでに登録されています。");
        return;
      }

      taskTemplates.push({ id: createId(), name });
      input.value = "";
      saveAll();
      renderAll();
    }

    function addTemplateOnEnter(event) {
      if (event.key !== "Enter") return;

      event.preventDefault();
      addTemplate();
    }

    function deleteTemplate(id) {
      taskTemplates = taskTemplates.filter(template => template.id !== id);
      saveAll();
      renderAll();
    }

    function renderTemplateManager() {
      const list = document.getElementById("templateList");

      if (taskTemplates.length === 0) {
        list.innerHTML = "<p class='muted'>テンプレートを追加すると、課題名を選べるようになります。</p>";
        return;
      }

      list.innerHTML = taskTemplates.map(template => `
        <span class="template-chip">
          ${escapeHtml(template.name)}
          <button type="button" onclick='deleteTemplate(${jsArgument(template.id)})'>×</button>
        </span>
      `).join("");
    }

    function renderTemplateOptions(selectedTitle = "") {
      const select = document.getElementById("taskTitleSelect");
      const customInput = document.getElementById("taskTitleOther");
      const currentTitle = selectedTitle || getSelectedTaskTitle();
      const matched = taskTemplates.find(template => template.name === currentTitle);
      const options = [
        ...taskTemplates.map(template => (
          `<option value="${escapeHtml(template.name)}">${escapeHtml(template.name)}</option>`
        )),
        "<option value='__other__'>その他</option>"
      ];

      select.innerHTML = options.join("");

      if (matched) {
        select.value = matched.name;
        customInput.value = "";
      } else {
        select.value = "__other__";
        customInput.value = currentTitle;
      }

      handleTitleSelectChange();
    }

    function handleTitleSelectChange() {
      const select = document.getElementById("taskTitleSelect");
      const customInput = document.getElementById("taskTitleOther");
      const isOther = select.value === "__other__";

      customInput.classList.toggle("hidden", !isOther);
      customInput.required = isOther;
      customInput.disabled = !isOther;
      if (isOther) customInput.focus();
    }

    function getSelectedTaskTitle() {
      const select = document.getElementById("taskTitleSelect");
      if (select.value === "__other__") {
        return document.getElementById("taskTitleOther").value.trim();
      }
      return select.value.trim();
    }

    function handleSubjectChange() {
      const subject = subjects.find(item => item.id === document.getElementById("taskSubject").value);
      if (!subject) return;

      document.getElementById("taskDeadline").value = getNextDueDate(subject.dueDay);
    }

    function getNextDueDate(dueDay) {
      const base = new Date();
      base.setHours(0, 0, 0, 0);
      const currentDay = base.getDay();
      let daysToAdd = (Number(dueDay) - currentDay + 7) % 7;
      if (daysToAdd === 0) daysToAdd = 7;

      const nextDate = new Date(base);
      nextDate.setDate(base.getDate() + daysToAdd);
      return formatDateInput(nextDate);
    }

    function saveTask(event) {
      event.preventDefault();
      removeExpiredTasks();

      const title = getSelectedTaskTitle();
      const subjectId = document.getElementById("taskSubject").value;
      if (!subjectId) {
        alert("先に教科を登録してください。");
        return;
      }
      if (!title) {
        alert("課題名を入力してください。");
        return;
      }

      const existingTask = editingTaskId
        ? tasks.find(item => item.id === editingTaskId)
        : null;
      const task = {
        id: editingTaskId || createId(),
        subjectId,
        title,
        dueDate: document.getElementById("taskDeadline").value,
        priority: document.getElementById("taskPriority").value,
        memo: document.getElementById("taskMemo").value.trim(),
        completed: existingTask?.completed ?? false
      };

      if (editingTaskId) {
        tasks = tasks.map(item => item.id === editingTaskId ? task : item);
      } else {
        tasks.push(task);
      }

      saveAll();
      resetTaskForm();
      renderAll();
    }

    function startEdit(id) {
      removeExpiredTasks();
      const task = tasks.find(item => item.id === id);
      if (!task) {
        renderAll();
        return;
      }

      editingTaskId = id;
      document.getElementById("taskFormTitle").textContent = "課題編集";
      document.getElementById("taskSubmitButton").textContent = "保存";
      document.getElementById("cancelEditButton").classList.remove("hidden");
      renderSubjectOptions(task.subjectId);
      renderTemplateOptions(task.title);
      document.getElementById("taskSubject").value = task.subjectId;
      document.getElementById("taskDeadline").value = task.dueDate;
      document.getElementById("taskPriority").value = task.priority;
      document.getElementById("taskMemo").value = task.memo;
      document.getElementById("taskForm").scrollIntoView({ behavior: "smooth", block: "start" });
    }

    function cancelEdit() {
      resetTaskForm();
      renderAll();
    }

    function resetTaskForm() {
      editingTaskId = null;
      document.getElementById("taskForm").reset();
      document.getElementById("taskFormTitle").textContent = "課題追加";
      document.getElementById("taskSubmitButton").textContent = "追加";
      document.getElementById("cancelEditButton").classList.add("hidden");
      renderSubjectOptions();
      renderTemplateOptions(taskTemplates[0]?.name || "");

      const selectedSubject = subjects.find(subject => subject.id === document.getElementById("taskSubject").value);
      document.getElementById("taskDeadline").value = selectedSubject
        ? getNextDueDate(selectedSubject.dueDay)
        : todayString;
    }

    function toggleTaskCompleted(id) {
      tasks = tasks.map(task => (
        task.id === id
          ? { ...task, completed: !task.completed }
          : task
      ));
      saveAll();
      renderTasks();
      renderCalendar();
    }

    function deleteTask(id) {
      const task = tasks.find(item => item.id === id);
      if (!task) return;

      const ok = confirm("この課題を削除しますか？");
      if (!ok) return;

      tasks = tasks.filter(task => task.id !== id);
      if (editingTaskId === id) resetTaskForm();
      saveAll();
      renderAll();
    }

    function normalizePriority(priority) {
      if (priority === "高" || priority === "high") return "high";
      if (priority === "中" || priority === "middle") return "middle";
      return "low";
    }

    function priorityClass(priority) {
      return normalizePriority(priority);
    }

    function priorityLabel(priority) {
      const labels = { high: "高", middle: "中", low: "低" };
      return labels[normalizePriority(priority)];
    }

    function getSubjectName(subjectId) {
      return subjects.find(subject => subject.id === subjectId)?.name || "削除済みの教科";
    }

    function getDueLabel(dueDate) {
      const diff = Math.round((parseDateInput(dueDate) - parseDateInput(todayString)) / 86400000);
      if (diff === 0) return "今日まで";
      if (diff === 1) return "明日まで";
      if (diff > 1 && diff <= 3) return "3日以内";
      return `${weekdays[parseDateInput(dueDate).getDay()]}曜日`;
    }

    function dueBadgeClass(dueDate) {
      const diff = Math.round((parseDateInput(dueDate) - parseDateInput(todayString)) / 86400000);
      if (diff === 0) return "high";
      if (diff <= 1) return "middle";
      if (diff <= 3) return "low";
      return "";
    }

    function renderTasks() {
      const list = document.getElementById("taskList");
      const sorted = [...tasks].sort((a, b) => {
        if (a.completed !== b.completed) return a.completed ? 1 : -1;
        return a.dueDate.localeCompare(b.dueDate);
      });

      if (sorted.length === 0) {
        list.innerHTML = "<p class='muted'>まだ課題がありません。</p>";
        return;
      }

      list.innerHTML = sorted.map(task => `
        <div class="task-card ${task.completed ? "completed-task-card" : ""}">
          <div class="task-main">
            <div class="item-title">${escapeHtml(task.title)}</div>
            <div class="task-meta">
              <span class="badge">${escapeHtml(getSubjectName(task.subjectId))}</span>
              <span class="badge ${dueBadgeClass(task.dueDate)}">提出期限 ${escapeHtml(task.dueDate)}（${weekdays[parseDateInput(task.dueDate).getDay()]}）</span>
              <span class="badge ${dueBadgeClass(task.dueDate)}">${getDueLabel(task.dueDate)}</span>
              <span class="badge ${priorityClass(task.priority)}">優先度 ${priorityLabel(task.priority)}</span>
              <span class="badge ${task.completed ? "low" : ""}">状態 ${task.completed ? "完了済み" : "未完了"}</span>
            </div>
            ${task.memo ? `<p class="memo">${escapeHtml(task.memo)}</p>` : ""}
          </div>
          <div class="actions">
            <button class="edit" onclick='startEdit(${jsArgument(task.id)})'>編集</button>
            <button class="done" onclick='toggleTaskCompleted(${jsArgument(task.id)})'>${task.completed ? "未完了に戻す" : "完了"}</button>
            <button class="delete" onclick='deleteTask(${jsArgument(task.id)})'>削除</button>
          </div>
        </div>
      `).join("");
    }

    function moveCalendarMonth(offset) {
      if (offset === 0) {
        visibleCalendarYear = new Date().getFullYear();
        visibleCalendarMonth = new Date().getMonth();
      } else {
        const next = new Date(visibleCalendarYear, visibleCalendarMonth + offset, 1);
        visibleCalendarYear = next.getFullYear();
        visibleCalendarMonth = next.getMonth();
      }

      renderCalendar();
    }

    function renderCalendar() {
      removeExpiredTasks();

      const title = document.getElementById("calendarTitle");
      const grid = document.getElementById("calendarGrid");
      const year = visibleCalendarYear;
      const month = visibleCalendarMonth;
      const monthKey = `${year}-${String(month + 1).padStart(2, "0")}`;
      const firstDay = new Date(year, month, 1).getDay();
      const daysInMonth = new Date(year, month + 1, 0).getDate();
      const monthTasks = tasks
        .filter(task => task.dueDate.startsWith(monthKey))
        .sort((a, b) => {
          if (a.completed !== b.completed) return a.completed ? 1 : -1;
          return a.dueDate.localeCompare(b.dueDate);
        });
      const unfinished = monthTasks.filter(task => !task.completed);
      const tasksByDate = {};

      monthTasks.forEach(task => {
        tasksByDate[task.dueDate] = tasksByDate[task.dueDate] || [];
        tasksByDate[task.dueDate].push(task);
      });

      title.textContent = `${year}年 ${month + 1}月`;
      document.getElementById("calendarMonthCount").textContent = `${monthTasks.length}件`;
      document.getElementById("calendarMonthUnfinished").textContent = `${unfinished.length}件`;
      document.getElementById("calendarMonthOverdue").textContent = "0件";

      let html = weekdays.map((day, index) => (
        `<div class="weekday ${index === 0 ? "sun" : ""} ${index === 6 ? "sat" : ""}">${day}</div>`
      )).join("");

      for (let i = 0; i < firstDay; i++) {
        html += "<div class='calendar-day empty'></div>";
      }

      for (let day = 1; day <= daysInMonth; day++) {
        const dateString = buildDateString(year, month, day);
        const dayTasks = tasksByDate[dateString] || [];
        const taskButtons = dayTasks
          .sort((a, b) => {
            if (a.completed !== b.completed) return a.completed ? 1 : -1;
            const priorityOrder = { high: 0, middle: 1, low: 2 };
            return priorityOrder[a.priority] - priorityOrder[b.priority];
          })
          .map(task => `
            <button
              type="button"
              class="calendar-task ${priorityClass(task.priority)} ${task.completed ? "completed-task" : ""}"
              onclick='toggleTaskCompleted(${jsArgument(task.id)})'
              aria-label="${escapeHtml(task.title)}の完了状態を切り替え"
            >
              <span class="calendar-task-title">${task.completed ? "✓ " : ""}${escapeHtml(getSubjectName(task.subjectId))} / ${escapeHtml(task.title)}</span>
              <span class="calendar-task-meta">優先度 ${priorityLabel(task.priority)}${task.completed ? "・完了" : ""}</span>
            </button>
          `).join("");

        html += `
          <div class="calendar-day ${dateString === todayString ? "today" : ""}">
            <div class="date-number">
              <span>${day}</span>
              ${dateString === todayString ? "<span class='today-label'>今日</span>" : ""}
            </div>
            ${taskButtons}
          </div>
        `;
      }

      grid.innerHTML = html;
      renderUpcomingTasks();
    }

    function renderUpcomingTasks() {
      const list = document.getElementById("upcomingTaskList");
      const upcoming = [...tasks]
        .sort((a, b) => {
          if (a.completed !== b.completed) return a.completed ? 1 : -1;
          return a.dueDate.localeCompare(b.dueDate);
        })
        .slice(0, 8);

      if (upcoming.length === 0) {
        list.innerHTML = "<p class='success-text'>未完了の課題はありません。</p>";
        return;
      }

      list.innerHTML = upcoming.map(task => `
        <div class="item ${task.completed ? "completed-task-card" : ""}">
          <div>
            <div class="item-title">${escapeHtml(task.title)}</div>
            <span class="badge">${escapeHtml(getSubjectName(task.subjectId))}</span>
            <span class="badge ${dueBadgeClass(task.dueDate)}">締切 ${escapeHtml(task.dueDate)}（${weekdays[parseDateInput(task.dueDate).getDay()]}）</span>
            <span class="badge ${priorityClass(task.priority)}">優先度 ${priorityLabel(task.priority)}</span>
            <span class="badge ${task.completed ? "low" : ""}">状態 ${task.completed ? "完了済み" : "未完了"}</span>
          </div>
          <div class="actions">
            <button class="edit" onclick='startEdit(${jsArgument(task.id)})'>編集</button>
            <button class="done" onclick='toggleTaskCompleted(${jsArgument(task.id)})'>${task.completed ? "未完了に戻す" : "完了"}</button>
            <button class="delete" onclick='deleteTask(${jsArgument(task.id)})'>削除</button>
          </div>
        </div>
      `).join("");
    }

    function renderAll() {
      removeExpiredTasks();
      renderSubjectManager();
      renderTemplateManager();
      renderSubjectOptions();
      renderTemplateOptions();
      renderTasks();
      renderCalendar();
    }

    resetTaskForm();
    renderAll();

    if ("serviceWorker" in navigator) {
      window.addEventListener("load", () => {
        navigator.serviceWorker.register("./service-worker.js")
          .catch(error => console.warn("Service Worker registration failed:", error));
      });
    }
  </script>
</body>
</html>
