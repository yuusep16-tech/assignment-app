<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#2563eb" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-title" content="課題管理" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <link rel="manifest" href="./manifest.json" />
  <link rel="icon" type="image/png" sizes="192x192" href="./icons/icon-192.png" />
  <link rel="apple-touch-icon" sizes="180x180" href="./icons/apple-touch-icon.png" />
  <title>課題・カレンダー管理アプリ</title>
  <style>
    :root {
      --bg: #f4f7fb;
      --card: #ffffff;
      --text: #1f2937;
      --muted: #6b7280;
      --main: #2563eb;
      --main-dark: #1d4ed8;
      --danger: #dc2626;
      --success: #16a34a;
      --warning: #f59e0b;
      --border: #e5e7eb;
      --shadow: 0 10px 25px rgba(15, 23, 42, 0.08);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    header {
      background: linear-gradient(135deg, #2563eb, #4f46e5);
      color: white;
      padding: 28px 20px;
      text-align: center;
    }

    header h1 {
      margin: 0;
      font-size: 28px;
    }

    header p {
      margin: 8px 0 0;
      opacity: 0.9;
    }

    .auth-panel {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 12px;
      align-items: center;
      max-width: 1100px;
      margin: 18px auto 0;
      padding: 14px;
      border: 1px solid rgba(255, 255, 255, 0.35);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.14);
      text-align: left;
    }

    .auth-status {
      display: grid;
      gap: 4px;
      min-width: 0;
    }

    .auth-status strong,
    .auth-status span {
      overflow-wrap: anywhere;
    }

    .auth-status span {
      font-size: 13px;
      opacity: 0.9;
    }

    .auth-actions {
      display: flex;
      gap: 8px;
      justify-content: flex-end;
      flex-wrap: wrap;
    }

    .auth-actions button {
      border: none;
      border-radius: 12px;
      padding: 10px 14px;
      font-weight: 800;
      cursor: pointer;
      white-space: nowrap;
    }

    .auth-actions .login {
      background: white;
      color: #1d4ed8;
    }

    .auth-actions .logout {
      background: rgba(255, 255, 255, 0.2);
      color: white;
      border: 1px solid rgba(255, 255, 255, 0.45);
    }

    .auth-actions button:disabled {
      cursor: wait;
      opacity: 0.65;
    }

    nav {
      position: sticky;
      top: 0;
      z-index: 10;
      background: white;
      display: flex;
      gap: 8px;
      padding: 10px;
      border-bottom: 1px solid var(--border);
      overflow-x: auto;
    }

    nav button {
      border: none;
      background: #eef2ff;
      color: #3730a3;
      padding: 10px 14px;
      border-radius: 999px;
      font-weight: 700;
      cursor: pointer;
      white-space: nowrap;
    }

    nav button.active {
      background: var(--main);
      color: white;
    }

    main {
      max-width: 1100px;
      margin: 0 auto;
      padding: 20px;
    }

    section {
      display: none;
    }

    section.active {
      display: block;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(230px, 1fr));
      gap: 16px;
      margin-bottom: 20px;
    }

    .card {
      background: var(--card);
      border-radius: 8px;
      padding: 18px;
      box-shadow: var(--shadow);
      border: 1px solid var(--border);
    }

    .card h2, .card h3 {
      margin-top: 0;
    }

    .number {
      font-size: 30px;
      font-weight: 800;
      margin: 8px 0;
    }

    .muted {
      color: var(--muted);
      font-size: 14px;
    }

    form {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(170px, 1fr));
      gap: 10px;
      margin-bottom: 16px;
    }

    input, select, textarea {
      width: 100%;
      padding: 11px;
      border-radius: 12px;
      border: 1px solid var(--border);
      font-size: 15px;
      background: white;
    }

    textarea {
      min-height: 46px;
      resize: vertical;
    }

    button.primary {
      border: none;
      background: var(--main);
      color: white;
      padding: 11px 14px;
      border-radius: 12px;
      font-weight: 800;
      cursor: pointer;
    }

    button.primary:hover {
      background: var(--main-dark);
    }

    button.delete {
      border: none;
      background: #fee2e2;
      color: var(--danger);
      padding: 8px 10px;
      border-radius: 10px;
      cursor: pointer;
      font-weight: 700;
    }

    button.done {
      border: none;
      background: #dcfce7;
      color: var(--success);
      padding: 8px 10px;
      border-radius: 10px;
      cursor: pointer;
      font-weight: 700;
    }

    .item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      padding: 12px 0;
      border-bottom: 1px solid var(--border);
    }

    .item:last-child {
      border-bottom: none;
    }

    .item-title {
      font-weight: 800;
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: flex-end;
      flex-shrink: 0;
    }

    .badge {
      display: inline-block;
      padding: 4px 8px;
      border-radius: 999px;
      background: #f3f4f6;
      font-size: 12px;
      color: #374151;
      margin-right: 4px;
      margin-top: 4px;
    }

    .high {
      background: #fee2e2;
      color: var(--danger);
    }

    .middle {
      background: #fef3c7;
      color: #92400e;
    }

    .low {
      background: #dcfce7;
      color: var(--success);
    }

    .completed {
      opacity: 0.55;
      text-decoration: line-through;
    }

    .bar-wrap {
      background: #e5e7eb;
      height: 12px;
      border-radius: 999px;
      overflow: hidden;
      margin-top: 8px;
    }

    .bar {
      height: 100%;
      width: 0%;
      background: var(--main);
      transition: 0.3s;
    }

    .danger-text {
      color: var(--danger);
      font-weight: 800;
    }

    .success-text {
      color: var(--success);
      font-weight: 800;
    }

    .footer-tools {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 16px;
    }

    .secondary {
      border: none;
      background: #e5e7eb;
      color: #374151;
      padding: 10px 12px;
      border-radius: 12px;
      cursor: pointer;
      font-weight: 700;
    }

    .management-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 16px;
      margin-top: 16px;
    }

    .manager-panel {
      background: #f8fafc;
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 14px;
    }

    .manager-panel h3 {
      margin: 0 0 12px;
    }

    .subject-tools,
    .template-tools {
      display: grid;
      grid-template-columns: minmax(140px, 1fr) minmax(120px, auto) auto;
      gap: 10px;
      margin: 14px 0 18px;
    }

    .template-tools {
      grid-template-columns: minmax(180px, 1fr) auto;
    }

    .subject-list,
    .template-list {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 18px;
    }

    .subject-chip,
    .template-chip {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 7px 10px;
      border-radius: 999px;
      background: #eef2ff;
      color: #3730a3;
      font-size: 13px;
      font-weight: 800;
    }

    .template-chip {
      background: #ecfdf5;
      color: #166534;
    }

    .subject-chip button,
    .template-chip button {
      border: none;
      background: transparent;
      color: #4338ca;
      cursor: pointer;
      font-weight: 900;
      padding: 0 2px;
    }

    .template-chip button {
      color: #15803d;
    }

    .form-card {
      border-top: 1px solid var(--border);
      padding-top: 16px;
    }

    .form-title-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 12px;
    }

    .form-title-row h3 {
      margin: 0;
    }

    .form-wide {
      grid-column: 1 / -1;
    }

    .hidden {
      display: none;
    }

    .login-required {
      margin: 0;
      padding: 14px;
      border: 1px dashed #c7d2fe;
      border-radius: 8px;
      background: #eef2ff;
      color: #3730a3;
      font-weight: 700;
      line-height: 1.6;
    }

    .calendar-grid .login-required {
      grid-column: 1 / -1;
    }

    button:disabled,
    input:disabled,
    select:disabled,
    textarea:disabled {
      cursor: not-allowed;
      opacity: 0.58;
    }


    .task-dashboard {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .task-form-toggle {
      display: none;
      width: 100%;
      min-height: 46px;
      align-items: center;
      justify-content: center;
      font-size: 16px;
    }

    .task-form-panel {
      display: block;
    }

    .task-focus-card {
      border-left: 5px solid var(--main);
    }

    .task-focus-card h2,
    .weekly-card h2,
    .task-list-card h2,
    .settings-card h2 {
      margin-bottom: 10px;
    }

    .quick-task-list {
      display: grid;
      gap: 10px;
    }

    .quick-task,
    .week-task {
      display: grid;
      gap: 6px;
      width: 100%;
      border: 1px solid var(--border);
      border-left: 5px solid var(--main);
      border-radius: 8px;
      background: #ffffff;
      color: var(--text);
      padding: 11px 12px;
      text-align: left;
      cursor: pointer;
      font: inherit;
    }

    .quick-task.high,
    .week-task.high {
      border-left-color: var(--danger);
    }

    .quick-task.middle,
    .week-task.middle {
      border-left-color: var(--warning);
    }

    .quick-task.low,
    .week-task.low {
      border-left-color: var(--success);
    }

    .quick-task.completed-task,
    .week-task.completed-task {
      background: #f8fafc;
      opacity: 0.68;
    }

    .quick-task.completed-task .quick-task-title,
    .week-task.completed-task .week-task-title {
      text-decoration: line-through;
    }

    .quick-task-title,
    .week-task-title {
      font-weight: 900;
      line-height: 1.35;
      overflow-wrap: anywhere;
    }

    .quick-task-meta,
    .week-task-status {
      color: var(--muted);
      font-size: 13px;
      font-weight: 700;
    }

    .focus-more-button {
      display: none;
      width: 100%;
      min-height: 42px;
      margin-top: 10px;
    }

    .week-list {
      display: grid;
      gap: 10px;
    }

    .week-day {
      border: 1px solid var(--border);
      border-radius: 8px;
      background: #ffffff;
      overflow: hidden;
    }

    .week-day-toggle,
    .week-day-empty-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      width: 100%;
      border: none;
      background: #eef2ff;
      color: #3730a3;
      padding: 10px 12px;
      text-align: left;
      font: inherit;
      font-weight: 900;
    }

    .week-day-toggle {
      cursor: pointer;
    }

    .week-day-empty-row {
      background: #f8fafc;
      color: var(--muted);
      font-size: 14px;
    }

    .week-day.today .week-day-toggle,
    .week-day.today .week-day-empty-row {
      background: #dbeafe;
      color: var(--main-dark);
    }

    .week-day-count {
      flex-shrink: 0;
      color: inherit;
      font-size: 13px;
      font-weight: 900;
    }

    .week-toggle-indicator {
      color: var(--muted);
      flex-shrink: 0;
      font-size: 12px;
      font-weight: 900;
    }

    .week-day-body {
      display: grid;
      gap: 8px;
      padding: 10px;
      background: #ffffff;
    }

    .mobile-calendar-card {
      display: none;
    }

    .mobile-calendar-toggle {
      width: 100%;
      min-height: 46px;
      font-size: 15px;
    }

    .mobile-calendar-panel {
      margin-top: 14px;
    }

    .settings-card summary {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      cursor: pointer;
      list-style: none;
    }

    .settings-card summary::-webkit-details-marker {
      display: none;
    }

    .settings-title {
      font-size: 20px;
      font-weight: 900;
    }

    .settings-hint {
      display: block;
      color: var(--muted);
      font-size: 13px;
      font-weight: 700;
      line-height: 1.4;
      margin-top: 3px;
    }

    .settings-card summary::after {
      content: "開く";
      border-radius: 999px;
      background: #eef2ff;
      color: #3730a3;
      padding: 7px 11px;
      font-size: 13px;
      font-weight: 900;
      white-space: nowrap;
    }

    .settings-card[open] summary::after {
      content: "閉じる";
      background: #e5e7eb;
      color: #374151;
    }

    .task-card {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 14px;
      padding: 14px 0;
      border-bottom: 1px solid var(--border);
    }

    .task-card:last-child {
      border-bottom: none;
    }

    .task-card.completed-task-card {
      opacity: 0.62;
    }

    .task-card.completed-task-card .item-title,
    .item.completed-task-card .item-title {
      text-decoration: line-through;
    }

    .task-main {
      min-width: 0;
    }

    .task-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-top: 8px;
    }

    .memo {
      margin: 8px 0 0;
      color: #4b5563;
      overflow-wrap: anywhere;
      line-height: 1.5;
    }

    button.edit {
      border: none;
      background: #dbeafe;
      color: var(--main-dark);
      padding: 8px 10px;
      border-radius: 10px;
      cursor: pointer;
      font-weight: 700;
    }

    button.calendar-add {
      border: none;
      background: #eef2ff;
      color: #3730a3;
      padding: 8px 10px;
      border-radius: 10px;
      cursor: pointer;
      font-weight: 700;
    }

    .calendar-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 16px;
    }

    .calendar-title {
      font-size: 26px;
      font-weight: 900;
    }

    .calendar-controls {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: flex-end;
    }

    .calendar-summary {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      gap: 10px;
      margin-bottom: 16px;
    }

    .summary-box {
      background: #f8fafc;
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 12px;
    }

    .summary-box strong {
      display: block;
      font-size: 22px;
      margin-top: 4px;
    }

    .calendar-grid {
      display: grid;
      grid-template-columns: repeat(7, minmax(0, 1fr));
      border: 1px solid var(--border);
      border-radius: 14px;
      overflow: hidden;
      background: white;
    }

    .weekday,
    .calendar-day {
      border-right: 1px solid var(--border);
      border-bottom: 1px solid var(--border);
    }

    .weekday:nth-child(7n),
    .calendar-day:nth-child(7n) {
      border-right: none;
    }

    .weekday {
      background: #f8fafc;
      color: #475569;
      padding: 10px 8px;
      text-align: center;
      font-size: 13px;
      font-weight: 900;
    }

    .weekday.sun {
      color: var(--danger);
    }

    .weekday.sat {
      color: var(--main);
    }

    .calendar-day {
      min-height: 128px;
      padding: 8px;
      background: white;
    }

    .calendar-day.empty {
      background: #f8fafc;
    }

    .calendar-day.today {
      background: #eff6ff;
      box-shadow: inset 0 0 0 2px var(--main);
    }

    .date-number {
      display: flex;
      justify-content: space-between;
      align-items: center;
      min-height: 22px;
      color: #475569;
      font-size: 13px;
      font-weight: 900;
      margin-bottom: 6px;
    }

    .today-label {
      color: white;
      background: var(--main);
      border-radius: 999px;
      padding: 2px 6px;
      font-size: 11px;
    }

    .calendar-task {
      display: block;
      border: 1px solid var(--border);
      border-left: 5px solid var(--main);
      border-radius: 8px;
      background: #ffffff;
      padding: 7px;
      margin-top: 6px;
      text-align: left;
      cursor: pointer;
      width: 100%;
    }

    .calendar-task.high {
      border-left-color: var(--danger);
    }

    .calendar-task.middle {
      border-left-color: var(--warning);
    }

    .calendar-task.low {
      border-left-color: var(--success);
    }

    .calendar-task.completed-task {
      opacity: 0.55;
    }

    .calendar-task.completed-task .calendar-task-title {
      text-decoration: line-through;
    }

    .calendar-task-title {
      display: block;
      color: var(--text);
      font-size: 13px;
      font-weight: 900;
      line-height: 1.35;
      overflow-wrap: anywhere;
    }

    .calendar-task-meta {
      color: var(--muted);
      display: block;
      font-size: 11px;
      line-height: 1.4;
      margin-top: 2px;
      overflow-wrap: anywhere;
    }

    .calendar-list {
      margin-top: 16px;
    }

    .calendar-list h3 {
      margin-bottom: 6px;
    }

    @media (min-width: 601px) {
      .quick-task-list,
      .week-list {
        display: flex;
        gap: 12px;
        overflow-x: auto;
        padding-bottom: 6px;
        scroll-snap-type: x proximity;
      }

      .quick-task {
        flex: 0 0 280px;
        min-width: 280px;
        scroll-snap-align: start;
      }

      .week-day {
        flex: 0 0 240px;
        min-width: 240px;
        scroll-snap-align: start;
      }

      .week-toggle-indicator {
        display: none;
      }
    }

    @media (max-width: 600px) {
      header {
        padding: 16px 14px;
      }

      header h1 {
        font-size: 21px;
      }

      header p {
        display: none;
      }

      .auth-panel {
        grid-template-columns: 1fr;
        margin-top: 14px;
        padding: 12px;
      }

      .auth-actions {
        justify-content: stretch;
      }

      .auth-actions button {
        flex: 1;
        min-height: 42px;
      }

      nav {
        padding: 8px;
      }

      nav button {
        min-height: 42px;
        padding: 9px 12px;
      }

      main {
        padding: 10px;
      }

      .task-dashboard {
        gap: 10px;
      }

      .card {
        padding: 13px;
      }

      .item {
        align-items: flex-start;
        flex-direction: column;
      }

      .actions {
        width: 100%;
      }

      form {
        grid-template-columns: 1fr;
      }

      input, select, textarea {
        font-size: 16px;
      }

      .subject-tools,
      .template-tools,
      .calendar-head {
        grid-template-columns: 1fr;
        flex-direction: column;
        align-items: stretch;
      }

      .task-card {
        grid-template-columns: 1fr;
      }

      .actions button {
        flex: 1;
        min-height: 42px;
      }

      .task-focus-card h2,
      .weekly-card h2,
      .task-list-card h2,
      .settings-title {
        font-size: 18px;
      }

      .task-form-card {
        order: 1;
      }

      .task-focus-card {
        order: 2;
      }

      .weekly-card {
        order: 3;
      }

      .task-list-card {
        order: 4;
      }

      .mobile-calendar-card {
        display: block;
        order: 5;
      }

      .settings-card {
        order: 6;
      }

      .task-form-toggle {
        display: flex;
      }

      .task-form-panel {
        display: none;
        margin-top: 12px;
      }

      .task-form-card.form-open .task-form-panel {
        display: block;
      }

      .task-form-panel .form-title-row {
        margin-bottom: 10px;
      }

      .task-form-panel .form-title-row h3 {
        font-size: 17px;
      }

      .quick-task-list,
      .week-list {
        display: grid;
        overflow-x: visible;
        padding-bottom: 0;
      }

      .quick-task,
      .week-day {
        flex: initial;
        min-width: 0;
        width: 100%;
      }

      .quick-task-list:not(.expanded) .quick-task-extra {
        display: none;
      }

      .focus-more-button {
        display: block;
      }

      .week-day-toggle,
      .week-day-empty-row,
      .week-day-body {
        padding-left: 10px;
        padding-right: 10px;
      }

      .week-day-empty-row {
        min-height: 38px;
        padding-top: 8px;
        padding-bottom: 8px;
      }

      .week-day.collapsed .week-day-body {
        display: none;
      }

      .quick-task,

  <script type="module">
    // Sparkプランで使える Firebase Authentication と Cloud Firestore だけを読み込みます。
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js";
    import {
      getAuth,
      GoogleAuthProvider,
      onAuthStateChanged,
      signInWithPopup,
      signOut
    } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-auth.js";
    import {
      collection,
      deleteDoc,
      doc,
      getDocs,
      getFirestore,
      setDoc,
      writeBatch
    } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyC25r5DnNKSawAZvTjgD7CbVuztcQJpdIU",
      authDomain: "assignment-app-179cc.firebaseapp.com",
      projectId: "assignment-app-179cc",
      storageBucket: "assignment-app-179cc.firebasestorage.app",
      messagingSenderId: "127969219519",
      appId: "1:127969219519:web:f36bb4c932333ad686c70a",
      measurementId: "G-10WGLLNJM8"
    };

    try {
      const app = initializeApp(firebaseConfig);
      const auth = getAuth(app);
      const db = getFirestore(app);
      const provider = new GoogleAuthProvider();
      provider.setCustomParameters({ prompt: "select_account" });

      function taskCollection(uid) {
        return collection(db, "users", uid, "tasks");
      }

      function taskDocument(uid, taskId) {
        return doc(db, "users", uid, "tasks", taskId);
      }

      function cleanTask(task) {
        const now = Date.now();
        const subject = String(task.subject || task.subjectName || "");
        return {
          id: String(task.id),
          subject,
          subjectId: String(task.subjectId || ""),
          subjectName: subject,
          subjectDueDay: Number.isFinite(Number(task.subjectDueDay)) ? Number(task.subjectDueDay) : null,
          title: String(task.title || ""),
          dueDate: String(task.dueDate || ""),
          priority: String(task.priority || "middle"),
          memo: String(task.memo || ""),
          completed: Boolean(task.completed),
          createdAt: Number(task.createdAt) || now,
          updatedAt: Number(task.updatedAt) || now
        };
      }

      window.firebaseCloud = {
        onAuthStateChanged(callback) {
          return onAuthStateChanged(auth, callback);
        },
        signInWithGoogle() {
          return signInWithPopup(auth, provider);
        },
        signOutUser() {
          return signOut(auth);
        },
        async loadTasks(uid) {
          try {
            const snapshot = await getDocs(taskCollection(uid));
            const loadedTasks = snapshot.docs.map(item => ({ id: item.id, ...item.data() }));
            console.log("Firestore tasks loaded", { uid, path: `users/${uid}/tasks`, count: loadedTasks.length, tasks: loadedTasks });
            return loadedTasks;
          } catch (error) {
            console.error("Firestore tasks load failed", { uid, path: `users/${uid}/tasks`, error });
            throw error;
          }
        },
        async saveTask(uid, task) {
          const cleaned = cleanTask(task);
          try {
            await setDoc(taskDocument(uid, cleaned.id), cleaned, { merge: true });
            console.log("Firestore task saved", { uid, taskId: cleaned.id, path: `users/${uid}/tasks/${cleaned.id}`, task: cleaned });
            return cleaned;
          } catch (error) {
            console.error("Firestore task save failed", { uid, taskId: cleaned.id, path: `users/${uid}/tasks/${cleaned.id}`, task: cleaned, error });
            throw error;
          }
        },
        async saveTasks(uid, tasks) {
          const cleanedTasks = tasks.map(cleanTask);
          try {
            for (let index = 0; index < cleanedTasks.length; index += 400) {
              const batch = writeBatch(db);
              cleanedTasks.slice(index, index + 400).forEach(task => {
                batch.set(taskDocument(uid, task.id), task, { merge: true });
              });
              await batch.commit();
            }
            console.log("Firestore tasks batch saved", { uid, path: `users/${uid}/tasks`, count: cleanedTasks.length, tasks: cleanedTasks });
            return cleanedTasks;
          } catch (error) {
            console.error("Firestore tasks batch save failed", { uid, path: `users/${uid}/tasks`, tasks: cleanedTasks, error });
            throw error;
          }
        },
        async deleteTask(uid, taskId) {
          try {
            await deleteDoc(taskDocument(uid, taskId));
            console.log("Firestore task deleted", { uid, taskId, path: `users/${uid}/tasks/${taskId}` });
          } catch (error) {
            console.error("Firestore task delete failed", { uid, taskId, path: `users/${uid}/tasks/${taskId}`, error });
            throw error;
          }
        },
        async deleteTasks(uid, taskIds) {
          try {
            for (let index = 0; index < taskIds.length; index += 400) {
              const batch = writeBatch(db);
              taskIds.slice(index, index + 400).forEach(taskId => {
                batch.delete(taskDocument(uid, taskId));
              });
              await batch.commit();
            }
            console.log("Firestore tasks batch deleted", { uid, taskIds, path: `users/${uid}/tasks` });
          } catch (error) {
            console.error("Firestore tasks batch delete failed", { uid, taskIds, path: `users/${uid}/tasks`, error });
            throw error;
          }
        }
      };

      window.dispatchEvent(new CustomEvent("firebaseCloudReady"));
    } catch (error) {
      window.dispatchEvent(new CustomEvent("firebaseCloudError", { detail: error }));
    }
  </script>

  <script>
    const DEFAULT_TEMPLATES = [
      "レポート",
      "小テスト",
      "予習",
      "復習",
      "プログラミング課題",
      "発表準備",
      "感想文",
      "スライド作成"
    ];
    const weekdays = ["日", "月", "火", "水", "木", "金", "土"];
    const weekdayLabels = ["日曜日", "月曜日", "火曜日", "水曜日", "木曜日", "金曜日", "土曜日"];
    const todayString = formatDateInput(new Date());

    let subjects = loadSubjects();
    let taskTemplates = loadTaskTemplates();
    let tasks = loadTasks();
    let editingTaskId = null;
    let visibleCalendarYear = new Date().getFullYear();
    let visibleCalendarMonth = new Date().getMonth();
    let visibleMobileCalendarYear = new Date().getFullYear();
    let visibleMobileCalendarMonth = new Date().getMonth();
    let isMobileCalendarOpen = false;
    let isTaskFormOpen = false;
    let isFocusExpanded = false;
    let hasToggledWeekDay = false;
    let currentUser = null;
    let isAuthReady = false;
    let isCloudReady = false;
    let isCloudDataReady = false;
    let isCloudBusy = false;
    let cloudErrorMessage = "";
    let cloudStatusMessage = "Googleログイン後、Firestoreから課題を読み込みます。";
    const openWeekDates = new Set();

    migrateOldData();
    saveAll();
    initializeFirebaseCloud();

    function saveAll() {
      localStorage.setItem("subjects", JSON.stringify(subjects));
      localStorage.setItem("taskTemplates", JSON.stringify(taskTemplates));
      localStorage.setItem("tasks", JSON.stringify(tasks));
    }

    function initializeFirebaseCloud() {
      window.addEventListener("firebaseCloudReady", () => {
        isCloudReady = true;
        cloudErrorMessage = "";
        registerAuthListener();
        updateAuthUi();
      });

      window.addEventListener("firebaseCloudError", event => {
        console.error("Firebase SDK initialization failed", event.detail);
        isAuthReady = true;
        isCloudReady = false;
        isCloudDataReady = false;
        cloudErrorMessage = `Firebaseを読み込めませんでした: ${event.detail?.message || "ネットワークを確認してください。"}`;
        updateAuthUi();
        renderAll();
      });

      if (window.firebaseCloud) {
        isCloudReady = true;
        registerAuthListener();
      }

      window.setTimeout(() => {
        if (isCloudReady || window.firebaseCloud) return;
        isAuthReady = true;
        cloudErrorMessage = "Firebase SDKを読み込めませんでした。ネットワーク接続を確認してください。";
        updateAuthUi();
        renderAll();
      }, 8000);

      updateAuthUi();
    }

    function registerAuthListener() {
      if (!window.firebaseCloud || registerAuthListener.hasRegistered) return;
      registerAuthListener.hasRegistered = true;

      window.firebaseCloud.onAuthStateChanged(async user => {
        isAuthReady = true;
        currentUser = user;
        cloudErrorMessage = "";
        console.log("Firebase auth state changed", user ? { uid: user.uid, email: user.email } : { uid: null });

        if (!user) {
          tasks = [];
          editingTaskId = null;
          isCloudDataReady = false;
          isCloudBusy = false;
          cloudStatusMessage = "ログインしてください。課題データはログイン後に表示されます。";
          updateAuthUi();
          resetTaskForm();
          renderAll();
          return;
        }

        await loadSignedInTasks(user);
      });
    }

    async function loadSignedInTasks(user) {
      isCloudBusy = true;
      isCloudDataReady = false;
      cloudStatusMessage = "Firestoreから課題を読み込んでいます。";
      updateAuthUi();
      renderAll();

      try {
        const remoteTasks = (await window.firebaseCloud.loadTasks(user.uid))
          .map(task => normalizeTask(task))
          .filter(task => task.title && task.dueDate && task.dueDate >= todayString);
        const localBackupTasks = loadTasks()
          .filter(task => task.title && task.dueDate && task.dueDate >= todayString);
        const migrationKey = getMigrationKey(user.uid);
        const hasMigrated = localStorage.getItem(migrationKey) === "true";

        let nextTasks = remoteTasks;
        if (!hasMigrated && localBackupTasks.length > 0) {
          nextTasks = mergeTaskLists(remoteTasks, localBackupTasks).map(task => enrichTaskForCloud(task));
          await window.firebaseCloud.saveTasks(user.uid, nextTasks);
          localStorage.setItem(migrationKey, "true");
          cloudStatusMessage = "localStorageの既存課題をFirestoreへ移行しました。バックアップはこの端末に残しています。";
        } else {
          cloudStatusMessage = "Firestoreと同期済みです。";
        }

        tasks = nextTasks;
        console.log("Applied Firestore tasks to app state", { uid: user.uid, count: tasks.length, tasks });
        isCloudDataReady = true;
        removeExpiredTasks();
        saveAll();
        resetTaskForm();
      } catch (error) {
        console.error("Firestore signed-in task load failed", { uid: user.uid, error });
        tasks = [];
        isCloudDataReady = false;
        cloudErrorMessage = `Firestoreに接続できませんでした: ${error.message || error}`;
        cloudStatusMessage = "無料のFirebase AuthenticationとCloud Firestoreのみを使います。有料機能への切り替えは行いません。";
      } finally {
        isCloudBusy = false;
        updateAuthUi();
        renderAll();
      }
    }

    function getMigrationKey(uid) {
      return `firestoreTasksMigrated:${uid}`;
    }

    function mergeTaskLists(remoteTasks, localTasks) {
      const merged = new Map();
      remoteTasks.forEach(task => merged.set(task.id, normalizeTask(task)));
      localTasks.forEach(task => {
        const normalized = normalizeTask(task);
        const existing = merged.get(normalized.id);
        if (!existing || Number(normalized.updatedAt || 0) > Number(existing.updatedAt || 0)) {
          merged.set(normalized.id, normalized);
        }
      });
      return [...merged.values()].sort((a, b) => a.dueDate.localeCompare(b.dueDate));
    }

    function isTaskAccessReady() {
      return Boolean(currentUser && isCloudDataReady && !isCloudBusy);
    }

    function getUnavailableMessage() {
      if (!isAuthReady || !isCloudReady) return "Firebaseを準備中です。少し待ってからもう一度お試しください。";
      if (!currentUser) return "ログインしてください。Googleアカウントでログインすると課題データを表示できます。";
      if (cloudErrorMessage) return "Firestoreに接続できないため、課題操作を一時停止しています。";
      return "Firestoreから課題データを読み込んでいます。";
    }

    function loginRequiredHtml(message = getUnavailableMessage()) {
      return `<p class="login-required">${escapeHtml(message)}</p>`;
    }

    function requireTaskAccess() {
      if (isTaskAccessReady()) return true;
      alert(getUnavailableMessage());
      updateAuthUi();
      return false;
    }

    function updateAuthUi() {
      const title = document.getElementById("authStatusTitle");
      const detail = document.getElementById("authStatusDetail");
      const loginButton = document.getElementById("googleLoginButton");
      const logoutButton = document.getElementById("logoutButton");
      if (!title || !detail || !loginButton || !logoutButton) return;

      loginButton.disabled = isCloudBusy || !isCloudReady;
      logoutButton.disabled = isCloudBusy || !isCloudReady;
      loginButton.classList.toggle("hidden", Boolean(currentUser));
      logoutButton.classList.toggle("hidden", !currentUser);

      if (cloudErrorMessage) {
        title.textContent = currentUser ? "クラウド同期を確認してください" : "Firebaseを準備できません";
        detail.textContent = `${cloudErrorMessage} Sparkプラン内のAuthenticationとCloud Firestoreだけを使用します。`;
      } else if (!isAuthReady || !isCloudReady) {
        title.textContent = "Firebaseを準備中";
        detail.textContent = "無料のAuthenticationとCloud Firestoreを読み込んでいます。";
      } else if (!currentUser) {
        title.textContent = "ログインしてください";
        detail.textContent = "Googleログイン後、ユーザーごとにFirestoreへ課題を保存します。";
      } else {
        title.textContent = `${currentUser.displayName || currentUser.email || "Googleアカウント"} でログイン中`;
        detail.textContent = cloudStatusMessage;
      }

      updateInteractiveState();
    }

    function updateInteractiveState() {
      const disabled = !isTaskAccessReady();
      document.querySelectorAll(
        "#taskForm input, #taskForm select, #taskForm textarea, #taskForm button, #taskFormToggle, #cancelEditButton, .subject-tools input, .subject-tools select, .subject-tools button, .template-tools input, .template-tools button"
      ).forEach(element => {
        element.disabled = disabled;
      });
    }

    async function signInWithGoogle() {
      if (!window.firebaseCloud) {
        alert("Firebaseを読み込めません。ネットワーク接続とFirebase設定を確認してください。");
        return;
      }

      isCloudBusy = true;
      cloudErrorMessage = "";
      cloudStatusMessage = "Googleログインを開いています。";
      updateAuthUi();

      try {
        await window.firebaseCloud.signInWithGoogle();
      } catch (error) {
        console.error("Google sign-in failed", error);
        if (error.code !== "auth/popup-closed-by-user" && error.code !== "auth/cancelled-popup-request") {
          cloudErrorMessage = `Googleログインに失敗しました: ${error.message || error}`;
          alert(cloudErrorMessage);
        }
      } finally {
        isCloudBusy = false;
        updateAuthUi();
      }
    }

    async function signOutUser() {
      if (!window.firebaseCloud) return;

      isCloudBusy = true;
      updateAuthUi();
      try {
        await window.firebaseCloud.signOutUser();
      } catch (error) {
        console.error("Sign-out failed", error);
        cloudErrorMessage = `ログアウトに失敗しました: ${error.message || error}`;
        alert(cloudErrorMessage);
      } finally {
        isCloudBusy = false;
        updateAuthUi();
      }
    }

    function enrichTaskForCloud(task) {
      const now = Date.now();
      const registeredSubject = subjects.find(item => item.id === task.subjectId);
      const subjectName = registeredSubject?.name || task.subject || task.subjectName || "";
      return normalizeTask({
        ...task,
        subject: subjectName,
        subjectName,
        subjectDueDay: Number.isFinite(Number(registeredSubject?.dueDay)) ? Number(registeredSubject.dueDay) : task.subjectDueDay,
        createdAt: Number(task.createdAt) || now,
        updatedAt: Number(task.updatedAt) || now
      });
    }

    async function saveTaskToCloud(task) {
      if (!currentUser || !window.firebaseCloud) throw new Error("ログインしてください。");
      const uid = currentUser.uid;
      if (!uid) throw new Error("ログイン中ユーザーのUIDを取得できません。");
      const cloudTask = enrichTaskForCloud(task);
      console.log("Saving task to Firestore", { uid, taskId: cloudTask.id, path: `users/${uid}/tasks/${cloudTask.id}`, task: cloudTask });
      const savedTask = await window.firebaseCloud.saveTask(uid, cloudTask);
      cloudStatusMessage = `Firestoreへ保存しました。UID: ${uid}`;
      return normalizeTask(savedTask || cloudTask);
    }

    async function deleteTaskFromCloud(taskId) {
      if (!currentUser || !window.firebaseCloud) throw new Error("ログインしてください。");
      const uid = currentUser.uid;
      if (!uid) throw new Error("ログイン中ユーザーのUIDを取得できません。");
      console.log("Deleting task from Firestore", { uid, taskId, path: `users/${uid}/tasks/${taskId}` });
      await window.firebaseCloud.deleteTask(uid, taskId);
      cloudStatusMessage = `Firestoreから削除しました。UID: ${uid}`;
    }

    async function deleteTasksFromCloud(taskIds) {
      if (!currentUser || !window.firebaseCloud || taskIds.length === 0) return;
      try {
        await window.firebaseCloud.deleteTasks(currentUser.uid, taskIds);
        cloudStatusMessage = "期限切れ課題をFirestoreから削除しました。";
        updateAuthUi();
      } catch (error) {
        console.error("Expired task delete sync failed", { uid: currentUser?.uid, taskIds, error });
        cloudErrorMessage = `期限切れ課題のクラウド削除に失敗しました: ${error.message || error}`;
        updateAuthUi();
      }
    }

    function loadArray(key) {
      try {
        const value = JSON.parse(localStorage.getItem(key));
        return Array.isArray(value) ? value : [];
      } catch {
        return [];
      }
    }

    function loadSubjects() {
      return loadArray("subjects")
        .map(subject => ({
          id: String(subject.id || createId()),
          name: String(subject.name || "").trim(),
          dueDay: Number(subject.dueDay)
        }))
        .filter(subject => subject.name && subject.dueDay >= 0 && subject.dueDay <= 6);
    }

    function loadTaskTemplates() {
      const saved = localStorage.getItem("taskTemplates");
      const templates = saved === null
        ? DEFAULT_TEMPLATES.map(name => ({ id: createId(), name }))
        : loadArray("taskTemplates");

      return templates
        .map(template => ({
          id: String(template.id || createId()),
          name: String(template.name || "").trim()
        }))
        .filter(template => template.name);
    }

    function loadTasks() {
      return loadArray("tasks")
        .map(task => normalizeTask(task))
        .filter(task => task.title && task.dueDate);
    }

    function migrateOldData() {
      const oldSubjectNames = loadArray("registeredSubjects")
        .map(name => String(name || "").trim())
        .filter(Boolean);
      const legacyTaskSubjects = loadArray("tasks")
        .map(task => String(task.subject || "").trim())
        .filter(Boolean);
      const names = [...oldSubjectNames, ...legacyTaskSubjects];

      names.forEach(name => {
        if (!subjects.some(subject => subject.name === name)) {
          subjects.push({ id: createId(), name, dueDay: 1 });
        }
      });

      tasks = loadArray("tasks")
        .map(task => normalizeTask(task))
        .filter(task => task.title && task.dueDate);
    }

    function normalizeTask(task) {
      const oldSubjectName = String(task.subject || task.subjectName || "").trim();
      const matchedSubject = oldSubjectName
        ? subjects.find(subject => subject.name === oldSubjectName)
        : null;

      return {
        id: String(task.id || createId()),
        subjectId: String(task.subjectId || matchedSubject?.id || ""),
        subjectName: String(task.subjectName || matchedSubject?.name || oldSubjectName || "").trim(),
        subjectDueDay: Number.isFinite(Number(task.subjectDueDay))
          ? Number(task.subjectDueDay)
          : Number.isFinite(Number(matchedSubject?.dueDay))
            ? Number(matchedSubject.dueDay)
            : null,
        title: String(task.title || "").trim(),
        dueDate: String(task.dueDate || task.deadline || ""),
        priority: normalizePriority(task.priority),
        memo: String(task.memo || "").trim(),
        completed: Boolean(task.completed ?? false),
        createdAt: Number(task.createdAt) || 0,
        updatedAt: Number(task.updatedAt) || 0
      };
    }

    function createId() {
      return `id-${Date.now()}-${Math.random().toString(36).slice(2, 9)}`;
    }

    function showPage(pageId, button) {
      document.querySelectorAll("section").forEach(section => section.classList.remove("active"));
      document.getElementById(pageId).classList.add("active");

      document.querySelectorAll(".tab").forEach(tab => tab.classList.remove("active"));
      button.classList.add("active");

      renderAll();
    }

    function formatDateInput(date) {
      const year = date.getFullYear();
      const month = String(date.getMonth() + 1).padStart(2, "0");
      const day = String(date.getDate()).padStart(2, "0");
      return `${year}-${month}-${day}`;
    }

    function buildDateString(year, month, day) {
      return `${year}-${String(month + 1).padStart(2, "0")}-${String(day).padStart(2, "0")}`;
    }

    function parseDateInput(value) {
      const [year, month, day] = String(value || "").split("-").map(Number);
      return new Date(year, month - 1, day);
    }

    function escapeHtml(value) {
      return String(value ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function jsArgument(value) {
      return escapeHtml(JSON.stringify(value));
    }

    function removeExpiredTasks() {
      if (!isTaskAccessReady()) return;

      const expiredTaskIds = tasks
        .filter(task => task.dueDate && task.dueDate < todayString)
        .map(task => task.id);
      if (expiredTaskIds.length === 0) return;

      tasks = tasks.filter(task => !task.dueDate || task.dueDate >= todayString);
      if (editingTaskId && expiredTaskIds.includes(editingTaskId)) editingTaskId = null;
      saveAll();
      deleteTasksFromCloud(expiredTaskIds);
    }

    function addSubject() {
      if (!requireTaskAccess()) return;

      const nameInput = document.getElementById("newSubjectName");
      const dueDayInput = document.getElementById("newSubjectDueDay");
      const name = nameInput.value.trim();
      const dueDay = Number(dueDayInput.value);
      if (!name) return;

      if (subjects.some(subject => subject.name === name)) {
        alert("同じ名前の教科がすでに登録されています。");
        return;
      }

      const subject = { id: createId(), name, dueDay };
      subjects.push(subject);
      subjects.sort((a, b) => a.name.localeCompare(b.name, "ja"));
      nameInput.value = "";
      saveAll();
      renderAll();
      renderSubjectOptions(subject.id);
      document.getElementById("taskSubject").value = subject.id;
      handleSubjectChange();
    }

    function addSubjectOnEnter(event) {
      if (event.key !== "Enter") return;

      event.preventDefault();
      addSubject();
    }

    function deleteSubject(id) {
      if (!requireTaskAccess()) return;

      const subject = subjects.find(item => item.id === id);
      if (!subject) return;

      const ok = confirm(`${subject.name} を登録教科から削除しますか？登録済みの課題はそのまま残ります。`);
      if (!ok) return;

      subjects = subjects.filter(item => item.id !== id);
      saveAll();
      renderAll();
    }

    function renderSubjectManager() {
      const list = document.getElementById("subjectList");

      if (!isTaskAccessReady()) {
        list.innerHTML = loginRequiredHtml("教科登録はログイン後に使えます。");
        return;
      }

      if (subjects.length === 0) {
        list.innerHTML = "<p class='muted'>教科と提出曜日を登録すると、課題追加で選べるようになります。</p>";
        return;
      }

      list.innerHTML = subjects.map(subject => `
        <span class="subject-chip">
          ${escapeHtml(subject.name)}・${weekdayLabels[subject.dueDay]}
          <button type="button" onclick='deleteSubject(${jsArgument(subject.id)})'>×</button>
        </span>
      `).join("");
    }

    function renderSubjectOptions(selectedSubjectId = "") {
      const select = document.getElementById("taskSubject");
      const currentValue = selectedSubjectId || select.value;
      const missingSelected = currentValue && !subjects.some(subject => subject.id === currentValue);
      const options = subjects.length
        ? subjects.map(subject => (
          `<option value="${escapeHtml(subject.id)}">${escapeHtml(subject.name)}（${weekdayLabels[subject.dueDay]}）</option>`
        ))
        : ["<option value=''>教科を登録してください</option>"];

      if (missingSelected) {
        options.unshift(`<option value="${escapeHtml(currentValue)}">削除済みの教科</option>`);
      }

      select.innerHTML = options.join("");
      if (currentValue) select.value = currentValue;
      if (!select.value && subjects[0]) select.value = subjects[0].id;
    }

    function addTemplate() {
      if (!requireTaskAccess()) return;

      const input = document.getElementById("newTemplateName");
      const name = input.value.trim();
      if (!name) return;

      if (taskTemplates.some(template => template.name === name)) {
        alert("同じ名前のテンプレートがすでに登録されています。");
        return;
      }

      taskTemplates.push({ id: createId(), name });
      input.value = "";
      saveAll();
      renderAll();
    }

    function addTemplateOnEnter(event) {
      if (event.key !== "Enter") return;

      event.preventDefault();
      addTemplate();
    }

    function deleteTemplate(id) {
      if (!requireTaskAccess()) return;

      taskTemplates = taskTemplates.filter(template => template.id !== id);
      saveAll();
      renderAll();
    }

    function renderTemplateManager() {
      const list = document.getElementById("templateList");

      if (!isTaskAccessReady()) {
        list.innerHTML = loginRequiredHtml("課題名テンプレートはログイン後に使えます。");
        return;
      }

      if (taskTemplates.length === 0) {
        list.innerHTML = "<p class='muted'>テンプレートを追加すると、課題名を選べるようになります。</p>";
        return;
      }

      list.innerHTML = taskTemplates.map(template => `
        <span class="template-chip">
          ${escapeHtml(template.name)}
          <button type="button" onclick='deleteTemplate(${jsArgument(template.id)})'>×</button>
        </span>
      `).join("");
    }

    function renderTemplateOptions(selectedTitle = "") {
      const select = document.getElementById("taskTitleSelect");
      const customInput = document.getElementById("taskTitleOther");
      const currentTitle = selectedTitle || getSelectedTaskTitle();
      const matched = taskTemplates.find(template => template.name === currentTitle);
      const options = [
        ...taskTemplates.map(template => (
          `<option value="${escapeHtml(template.name)}">${escapeHtml(template.name)}</option>`
        )),
        "<option value='__other__'>その他</option>"
      ];

      select.innerHTML = options.join("");

      if (matched) {
        select.value = matched.name;
        customInput.value = "";
      } else {
        select.value = "__other__";
        customInput.value = currentTitle;
      }

      handleTitleSelectChange();
    }

    function handleTitleSelectChange() {
      const select = document.getElementById("taskTitleSelect");
      const customInput = document.getElementById("taskTitleOther");
      const isOther = select.value === "__other__";

      customInput.classList.toggle("hidden", !isOther);
      customInput.required = isOther;
      customInput.disabled = !isOther;
      if (isOther) customInput.focus();
    }

    function getSelectedTaskTitle() {
      const select = document.getElementById("taskTitleSelect");
      if (select.value === "__other__") {
        return document.getElementById("taskTitleOther").value.trim();
      }
      return select.value.trim();
    }

    function handleSubjectChange() {
      const subject = subjects.find(item => item.id === document.getElementById("taskSubject").value);
      if (!subject) return;

      document.getElementById("taskDeadline").value = getNextDueDate(subject.dueDay);
    }

    function getNextDueDate(dueDay) {
      const base = new Date();
      base.setHours(0, 0, 0, 0);
      const currentDay = base.getDay();
      let daysToAdd = (Number(dueDay) - currentDay + 7) % 7;
      if (daysToAdd === 0) daysToAdd = 7;

      const nextDate = new Date(base);
      nextDate.setDate(base.getDate() + daysToAdd);
      return formatDateInput(nextDate);
    }


    function updateTaskFormPanel() {
      const card = document.getElementById("taskFormCard");
      const panel = document.getElementById("taskFormPanel");
      const button = document.getElementById("taskFormToggle");
      if (!card || !panel || !button) return;

      const isMobile = window.matchMedia ? window.matchMedia("(max-width: 600px)").matches : true;
      card.classList.toggle("form-open", isTaskFormOpen);
      panel.setAttribute("aria-hidden", String(isMobile && !isTaskFormOpen));
      button.textContent = isTaskFormOpen ? "− 課題追加を閉じる" : "＋ 課題を追加";
    }

    function toggleTaskFormPanel() {
      isTaskFormOpen = !isTaskFormOpen;
      updateTaskFormPanel();
    }

    function openTaskFormPanel() {
      isTaskFormOpen = true;
      updateTaskFormPanel();
    }

    function closeTaskFormPanel() {
      isTaskFormOpen = false;
      updateTaskFormPanel();
    }

    async function saveTask(event) {
      event.preventDefault();
      if (!requireTaskAccess()) return;
      removeExpiredTasks();

      const title = getSelectedTaskTitle();
      const subjectId = document.getElementById("taskSubject").value;
      if (!subjectId) {
        alert("先に教科を登録してください。");
        return;
      }
      if (!title) {
        alert("課題名を入力してください。");
        return;
      }

      const existingTask = editingTaskId
        ? tasks.find(item => item.id === editingTaskId)
        : null;
      console.log("Task form submit started", { uid: currentUser?.uid, mode: editingTaskId ? "edit" : "add", editingTaskId });
      const selectedSubject = subjects.find(item => item.id === subjectId);
      const now = Date.now();
      const task = {
        id: editingTaskId || createId(),
        subjectId,
        subject: selectedSubject?.name || existingTask?.subject || existingTask?.subjectName || "",
        title,
        dueDate: document.getElementById("taskDeadline").value,
        priority: document.getElementById("taskPriority").value,
        memo: document.getElementById("taskMemo").value.trim(),
        completed: existingTask?.completed ?? false,
        subjectName: selectedSubject?.name || existingTask?.subjectName || "",
        subjectDueDay: Number.isFinite(Number(selectedSubject?.dueDay)) ? Number(selectedSubject.dueDay) : existingTask?.subjectDueDay ?? null,
        createdAt: existingTask?.createdAt || now,
        updatedAt: now
      };

      try {
        const cloudTask = await saveTaskToCloud(task);
        console.log("Task form Firestore save completed", { uid: currentUser?.uid, taskId: cloudTask.id, task: cloudTask });
        if (editingTaskId) {
          tasks = tasks.map(item => item.id === editingTaskId ? cloudTask : item);
        } else {
          tasks.push(cloudTask);
        }

        saveAll();
        resetTaskForm();
        renderAll();
      } catch (error) {
        console.error("Task form save failed", { uid: currentUser?.uid, task, error });
        cloudErrorMessage = `Firestoreへの保存に失敗しました: ${error.message || error}`;
        alert(cloudErrorMessage);
        updateAuthUi();
      }
    }

    function startEdit(id) {
      if (!requireTaskAccess()) return;
      removeExpiredTasks();
      const task = tasks.find(item => item.id === id);
      if (!task) {
        renderAll();
        return;
      }

      editingTaskId = id;
      document.getElementById("taskFormTitle").textContent = "課題編集";
      document.getElementById("taskSubmitButton").textContent = "保存";
      document.getElementById("cancelEditButton").classList.remove("hidden");
      renderSubjectOptions(task.subjectId);
      renderTemplateOptions(task.title);
      document.getElementById("taskSubject").value = task.subjectId;
      document.getElementById("taskDeadline").value = task.dueDate;
      document.getElementById("taskPriority").value = task.priority;
      document.getElementById("taskMemo").value = task.memo;
      openTaskFormPanel();
      document.getElementById("taskFormCard").scrollIntoView({ behavior: "smooth", block: "start" });
    }

    function cancelEdit() {
      resetTaskForm();
      renderAll();
    }

    function resetTaskForm() {
      editingTaskId = null;
      document.getElementById("taskForm").reset();
      document.getElementById("taskFormTitle").textContent = "課題追加";
      document.getElementById("taskSubmitButton").textContent = "追加";
      document.getElementById("cancelEditButton").classList.add("hidden");
      renderSubjectOptions();
      renderTemplateOptions(taskTemplates[0]?.name || "");

      const selectedSubject = subjects.find(subject => subject.id === document.getElementById("taskSubject").value);
      document.getElementById("taskDeadline").value = selectedSubject
        ? getNextDueDate(selectedSubject.dueDay)
        : todayString;
      closeTaskFormPanel();
      updateInteractiveState();
    }

    async function toggleTaskCompleted(id) {
      if (!requireTaskAccess()) return;

      const targetTask = tasks.find(task => task.id === id);
      if (!targetTask) return;
      const updatedTask = {
        ...targetTask,
        completed: !targetTask.completed,
        updatedAt: Date.now()
      };
      console.log("Task completion toggle started", { uid: currentUser?.uid, taskId: id, completed: updatedTask.completed });

      try {
        const cloudTask = await saveTaskToCloud(updatedTask);
        console.log("Task completion Firestore save completed", { uid: currentUser?.uid, taskId: id, task: cloudTask });
        tasks = tasks.map(task => task.id === id ? cloudTask : task);
        saveAll();
        renderTasks();
        renderTodayFocus();
        renderSevenDayTasks();
        renderCalendar();
        renderMobileCalendar();
        updateAuthUi();
      } catch (error) {
        console.error("Task completion sync failed", { uid: currentUser?.uid, taskId: id, task: updatedTask, error });
        cloudErrorMessage = `Firestoreへの保存に失敗しました: ${error.message || error}`;
        alert(cloudErrorMessage);
        updateAuthUi();
      }
    }

    async function deleteTask(id) {
      if (!requireTaskAccess()) return;

      const task = tasks.find(item => item.id === id);
      if (!task) return;

      const ok = confirm("この課題を削除しますか？");
      if (!ok) return;

      try {
        await deleteTaskFromCloud(id);
        console.log("Task delete Firestore completed", { uid: currentUser?.uid, taskId: id });
        tasks = tasks.filter(task => task.id !== id);
        if (editingTaskId === id) resetTaskForm();
        saveAll();
        renderAll();
        updateAuthUi();
      } catch (error) {
        console.error("Task delete sync failed", { uid: currentUser?.uid, taskId: id, error });
        cloudErrorMessage = `Firestoreからの削除に失敗しました: ${error.message || error}`;
        alert(cloudErrorMessage);
        updateAuthUi();
      }
    }

    function normalizePriority(priority) {
      if (priority === "高" || priority === "high") return "high";
      if (priority === "中" || priority === "middle") return "middle";
      return "low";
    }

    function priorityClass(priority) {
      return normalizePriority(priority);
    }

    function priorityLabel(priority) {
      const labels = { high: "高", middle: "中", low: "低" };
      return labels[normalizePriority(priority)];
    }

    function getSubjectName(subjectId) {
      return subjects.find(subject => subject.id === subjectId)?.name || "削除済みの教科";
    }

    function getTaskSubjectName(task) {
      return subjects.find(subject => subject.id === task.subjectId)?.name
        || task.subjectName
        || "削除済みの教科";
    }

    function addDaysToDateString(dateString, days) {
      const date = parseDateInput(dateString);
      date.setDate(date.getDate() + days);
      return formatDateInput(date);
    }

    function formatGoogleCalendarDate(dateString) {
      return dateString.replaceAll("-", "");
    }

    function getGoogleCalendarUrl(task) {
      const subjectName = getTaskSubjectName(task);
      const title = `提出期限：${subjectName} / ${task.title}`;
      const startDate = formatGoogleCalendarDate(task.dueDate);
      const endDate = formatGoogleCalendarDate(addDaysToDateString(task.dueDate, 1));
      const params = new URLSearchParams({
        action: "TEMPLATE",
        text: title,
        dates: `${startDate}/${endDate}`
      });

      return `https://calendar.google.com/calendar/render?${params.toString()}`;
    }

    function openGoogleCalendarTask(id) {
      if (!requireTaskAccess()) return;

      const task = tasks.find(item => item.id === id);
      if (!task) return;

      window.open(getGoogleCalendarUrl(task), "_blank", "noopener");
    }

    function getDueLabel(dueDate) {
      const diff = Math.round((parseDateInput(dueDate) - parseDateInput(todayString)) / 86400000);
      if (diff === 0) return "今日まで";
      if (diff === 1) return "明日まで";
      if (diff > 1 && diff <= 3) return "3日以内";
      return `${weekdays[parseDateInput(dueDate).getDay()]}曜日`;
    }


    function formatShortDate(dateString) {
      const date = parseDateInput(dateString);
      return `${date.getMonth() + 1}/${date.getDate()}（${weekdays[date.getDay()]}）`;
    }

    function sortTasksForDisplay(list) {
      return [...list].sort((a, b) => {
        if (a.completed !== b.completed) return a.completed ? 1 : -1;
        if (a.dueDate !== b.dueDate) return a.dueDate.localeCompare(b.dueDate);
        const priorityOrder = { high: 0, middle: 1, low: 2 };
        return priorityOrder[a.priority] - priorityOrder[b.priority];
      });
    }

    function getTasksForDate(dateString) {
      return sortTasksForDisplay(tasks.filter(task => task.dueDate === dateString));
    }

    function sortUpcomingTasks(list) {
      return [...list].sort((a, b) => {
        if (a.dueDate !== b.dueDate) return a.dueDate.localeCompare(b.dueDate);
        if (a.completed !== b.completed) return a.completed ? 1 : -1;
        const priorityOrder = { high: 0, middle: 1, low: 2 };
        return priorityOrder[a.priority] - priorityOrder[b.priority];
      });
    }

    function getUpcomingTasks() {
      const upcomingLimitDate = addDaysToDateString(todayString, 2);
      return sortUpcomingTasks(tasks.filter(task => (
        !task.completed
        && task.dueDate >= todayString
        && task.dueDate <= upcomingLimitDate
      )));
    }

    function renderTaskToggleButton(task, className, extraClass = "") {
      const titleClass = className === "quick-task" ? "quick-task-title" : "week-task-title";
      const metaClass = className === "quick-task" ? "quick-task-meta" : "week-task-status";
      const dueText = className === "quick-task" ? `${formatShortDate(task.dueDate)}・${getDueLabel(task.dueDate)}・` : "";
      const statusText = task.completed ? "完了済み" : "未完了";

      return `
        <button
          type="button"
          class="${className} ${extraClass} ${priorityClass(task.priority)} ${task.completed ? "completed-task" : ""}"
          onclick='toggleTaskCompleted(${jsArgument(task.id)})'
          aria-label="${escapeHtml(getTaskSubjectName(task))} / ${escapeHtml(task.title)}の完了状態を切り替え"
        >
          <span class="${titleClass}">${escapeHtml(getTaskSubjectName(task))} / ${escapeHtml(task.title)}</span>
          <span class="${metaClass}">${dueText}${statusText}・優先度 ${priorityLabel(task.priority)}</span>
        </button>
      `;
    }

    function toggleFocusTasks() {
      isFocusExpanded = !isFocusExpanded;
      renderTodayFocus();
    }

    function toggleWeekDay(dateString) {
      hasToggledWeekDay = true;
      if (openWeekDates.has(dateString)) {
        openWeekDates.delete(dateString);
      } else {
        openWeekDates.add(dateString);
      }
      renderSevenDayTasks();
    }

    function renderTodayFocus() {
      const title = document.getElementById("taskFocusTitle");
      const list = document.getElementById("todayFocusList");

      title.textContent = "期限が近い課題";

      if (!isTaskAccessReady()) {
        list.classList.remove("expanded");
        list.innerHTML = loginRequiredHtml();
        return;
      }

      const focusTasks = getUpcomingTasks();

      if (focusTasks.length === 0) {
        list.classList.remove("expanded");
        list.innerHTML = "<p class='success-text'>直近3日間の未完了課題はありません。</p>";
        return;
      }

      list.classList.toggle("expanded", isFocusExpanded);
      const taskHtml = focusTasks.map((task, index) => (
        renderTaskToggleButton(task, "quick-task", index >= 3 ? "quick-task-extra" : "")
      )).join("");
      const moreButton = focusTasks.length > 3
        ? `<button class="secondary focus-more-button" type="button" onclick="toggleFocusTasks()">${isFocusExpanded ? "少なく表示" : "もっと見る"}</button>`
        : "";

      list.innerHTML = taskHtml + moreButton;
    }

    function renderSevenDayTasks() {
      const list = document.getElementById("sevenDayTaskList");
      if (!isTaskAccessReady()) {
        list.innerHTML = loginRequiredHtml();
        return;
      }

      let html = "";

      for (let offset = 0; offset < 7; offset++) {
        const dateString = addDaysToDateString(todayString, offset);
        const dayTasks = getTasksForDate(dateString);
        const shouldAutoOpenToday = !hasToggledWeekDay && offset === 0 && dayTasks.length > 0;
        const isOpen = dayTasks.length > 0 && (openWeekDates.has(dateString) || shouldAutoOpenToday);

        if (dayTasks.length === 0) {
          html += `
            <div class="week-day no-tasks ${offset === 0 ? "today" : ""}">
              <div class="week-day-empty-row">
                <span>${formatShortDate(dateString)}</span>
                <span>課題なし</span>
              </div>
            </div>
          `;
          continue;
        }

        html += `
          <div class="week-day has-tasks ${isOpen ? "" : "collapsed"} ${offset === 0 ? "today" : ""}">
            <button
              type="button"
              class="week-day-toggle"
              onclick='toggleWeekDay(${jsArgument(dateString)})'
              aria-expanded="${String(isOpen)}"
            >
              <span>${formatShortDate(dateString)}</span>
              <span class="week-day-count">${dayTasks.length}件</span>
              <span class="week-toggle-indicator">${isOpen ? "閉じる" : "開く"}</span>
            </button>
            <div class="week-day-body">
              ${dayTasks.map(task => renderTaskToggleButton(task, "week-task")).join("")}
            </div>
          </div>
        `;
      }

      list.innerHTML = html;
    }

    function dueBadgeClass(dueDate) {
      const diff = Math.round((parseDateInput(dueDate) - parseDateInput(todayString)) / 86400000);
      if (diff === 0) return "high";
      if (diff <= 1) return "middle";
      if (diff <= 3) return "low";
      return "";
    }

    function renderTasks() {
      const list = document.getElementById("taskList");
      if (!isTaskAccessReady()) {
        list.innerHTML = loginRequiredHtml();
        return;
      }

      const sorted = [...tasks].sort((a, b) => {
        if (a.completed !== b.completed) return a.completed ? 1 : -1;
        return a.dueDate.localeCompare(b.dueDate);
      });

      if (sorted.length === 0) {
        list.innerHTML = "<p class='muted'>まだ課題がありません。</p>";
        return;
      }

      list.innerHTML = sorted.map(task => `
        <div class="task-card ${task.completed ? "completed-task-card" : ""}">
          <div class="task-main">
            <div class="item-title">${escapeHtml(task.title)}</div>
            <div class="task-meta">
              <span class="badge">${escapeHtml(getTaskSubjectName(task))}</span>
              <span class="badge ${dueBadgeClass(task.dueDate)}">提出期限 ${escapeHtml(task.dueDate)}（${weekdays[parseDateInput(task.dueDate).getDay()]}）</span>
              <span class="badge ${dueBadgeClass(task.dueDate)}">${getDueLabel(task.dueDate)}</span>
              <span class="badge ${priorityClass(task.priority)}">優先度 ${priorityLabel(task.priority)}</span>
              <span class="badge ${task.completed ? "low" : ""}">状態 ${task.completed ? "完了済み" : "未完了"}</span>
            </div>
            ${task.memo ? `<p class="memo">${escapeHtml(task.memo)}</p>` : ""}
          </div>
          <div class="actions">
            <button class="calendar-add" onclick='openGoogleCalendarTask(${jsArgument(task.id)})'>Googleカレンダーに追加</button>
            <button class="edit" onclick='startEdit(${jsArgument(task.id)})'>編集</button>
            <button class="done" onclick='toggleTaskCompleted(${jsArgument(task.id)})'>${task.completed ? "未完了に戻す" : "完了"}</button>
            <button class="delete" onclick='deleteTask(${jsArgument(task.id)})'>削除</button>
          </div>
        </div>
      `).join("");
    }

    function moveCalendarMonth(offset) {
      if (offset === 0) {
        visibleCalendarYear = new Date().getFullYear();
        visibleCalendarMonth = new Date().getMonth();
      } else {
        const next = new Date(visibleCalendarYear, visibleCalendarMonth + offset, 1);
        visibleCalendarYear = next.getFullYear();
        visibleCalendarMonth = next.getMonth();
      }

      renderCalendar();
    }

    function renderCalendar() {
      const title = document.getElementById("calendarTitle");
      const grid = document.getElementById("calendarGrid");

      if (!isTaskAccessReady()) {
        title.textContent = "カレンダー";
        document.getElementById("calendarMonthCount").textContent = "0件";
        document.getElementById("calendarMonthUnfinished").textContent = "0件";
        document.getElementById("calendarMonthOverdue").textContent = "0件";
        grid.innerHTML = loginRequiredHtml();
        renderUpcomingTasks();
        return;
      }

      removeExpiredTasks();
      const year = visibleCalendarYear;
      const month = visibleCalendarMonth;
      const monthKey = `${year}-${String(month + 1).padStart(2, "0")}`;
      const firstDay = new Date(year, month, 1).getDay();
      const daysInMonth = new Date(year, month + 1, 0).getDate();
      const monthTasks = tasks
        .filter(task => task.dueDate.startsWith(monthKey))
        .sort((a, b) => {
          if (a.completed !== b.completed) return a.completed ? 1 : -1;
          return a.dueDate.localeCompare(b.dueDate);
        });
      const unfinished = monthTasks.filter(task => !task.completed);
      const tasksByDate = {};

      monthTasks.forEach(task => {
        tasksByDate[task.dueDate] = tasksByDate[task.dueDate] || [];
        tasksByDate[task.dueDate].push(task);
      });

      title.textContent = `${year}年 ${month + 1}月`;
      document.getElementById("calendarMonthCount").textContent = `${monthTasks.length}件`;
      document.getElementById("calendarMonthUnfinished").textContent = `${unfinished.length}件`;
      document.getElementById("calendarMonthOverdue").textContent = "0件";

      let html = weekdays.map((day, index) => (
        `<div class="weekday ${index === 0 ? "sun" : ""} ${index === 6 ? "sat" : ""}">${day}</div>`
      )).join("");

      for (let i = 0; i < firstDay; i++) {
        html += "<div class='calendar-day empty'></div>";
      }

      for (let day = 1; day <= daysInMonth; day++) {
        const dateString = buildDateString(year, month, day);
        const dayTasks = tasksByDate[dateString] || [];
        const taskButtons = dayTasks
          .sort((a, b) => {
            if (a.completed !== b.completed) return a.completed ? 1 : -1;
            const priorityOrder = { high: 0, middle: 1, low: 2 };
            return priorityOrder[a.priority] - priorityOrder[b.priority];
          })
          .map(task => `
            <button
              type="button"
              class="calendar-task ${priorityClass(task.priority)} ${task.completed ? "completed-task" : ""}"
              onclick='toggleTaskCompleted(${jsArgument(task.id)})'
              aria-label="${escapeHtml(task.title)}の完了状態を切り替え"
            >
              <span class="calendar-task-title">${task.completed ? "✓ " : ""}${escapeHtml(getTaskSubjectName(task))} / ${escapeHtml(task.title)}</span>
              <span class="calendar-task-meta">優先度 ${priorityLabel(task.priority)}${task.completed ? "・完了" : ""}</span>
            </button>
          `).join("");

        html += `
          <div class="calendar-day ${dateString === todayString ? "today" : ""}">
            <div class="date-number">
              <span>${day}</span>
              ${dateString === todayString ? "<span class='today-label'>今日</span>" : ""}
            </div>
            ${taskButtons}
          </div>
        `;
      }

      grid.innerHTML = html;
      renderUpcomingTasks();
    }

    function renderUpcomingTasks() {
      const list = document.getElementById("upcomingTaskList");
      if (!isTaskAccessReady()) {
        list.innerHTML = loginRequiredHtml();
        return;
      }

      const upcoming = [...tasks]
        .sort((a, b) => {
          if (a.completed !== b.completed) return a.completed ? 1 : -1;
          return a.dueDate.localeCompare(b.dueDate);
        })
        .slice(0, 8);

      if (upcoming.length === 0) {
        list.innerHTML = "<p class='success-text'>未完了の課題はありません。</p>";
        return;
      }

      list.innerHTML = upcoming.map(task => `
        <div class="item ${task.completed ? "completed-task-card" : ""}">
          <div>
            <div class="item-title">${escapeHtml(task.title)}</div>
            <span class="badge">${escapeHtml(getTaskSubjectName(task))}</span>
            <span class="badge ${dueBadgeClass(task.dueDate)}">締切 ${escapeHtml(task.dueDate)}（${weekdays[parseDateInput(task.dueDate).getDay()]}）</span>
            <span class="badge ${priorityClass(task.priority)}">優先度 ${priorityLabel(task.priority)}</span>
            <span class="badge ${task.completed ? "low" : ""}">状態 ${task.completed ? "完了済み" : "未完了"}</span>
          </div>
          <div class="actions">
            <button class="calendar-add" onclick='openGoogleCalendarTask(${jsArgument(task.id)})'>Googleカレンダーに追加</button>
            <button class="edit" onclick='startEdit(${jsArgument(task.id)})'>編集</button>
            <button class="done" onclick='toggleTaskCompleted(${jsArgument(task.id)})'>${task.completed ? "未完了に戻す" : "完了"}</button>
            <button class="delete" onclick='deleteTask(${jsArgument(task.id)})'>削除</button>
          </div>
        </div>
      `).join("");
    }

    function renderCalendarGridFor(year, month) {
      if (!isTaskAccessReady()) {
        return { html: loginRequiredHtml(), monthTasks: [], unfinished: [] };
      }

      const monthKey = `${year}-${String(month + 1).padStart(2, "0")}`;
      const firstDay = new Date(year, month, 1).getDay();
      const daysInMonth = new Date(year, month + 1, 0).getDate();
      const monthTasks = tasks
        .filter(task => task.dueDate.startsWith(monthKey))
        .sort((a, b) => {
          if (a.completed !== b.completed) return a.completed ? 1 : -1;
          return a.dueDate.localeCompare(b.dueDate);
        });
      const unfinished = monthTasks.filter(task => !task.completed);
      const tasksByDate = {};

      monthTasks.forEach(task => {
        tasksByDate[task.dueDate] = tasksByDate[task.dueDate] || [];
        tasksByDate[task.dueDate].push(task);
      });

      let html = weekdays.map((day, index) => (
        `<div class="weekday ${index === 0 ? "sun" : ""} ${index === 6 ? "sat" : ""}">${day}</div>`
      )).join("");

      for (let i = 0; i < firstDay; i++) {
        html += "<div class='calendar-day empty'></div>";
      }

      for (let day = 1; day <= daysInMonth; day++) {
        const dateString = buildDateString(year, month, day);
        const dayTasks = tasksByDate[dateString] || [];
        const taskButtons = sortTasksForDisplay(dayTasks)
          .map(task => `
            <button
              type="button"
              class="calendar-task ${priorityClass(task.priority)} ${task.completed ? "completed-task" : ""}"
              onclick='toggleTaskCompleted(${jsArgument(task.id)})'
              aria-label="${escapeHtml(task.title)}の完了状態を切り替え"
            >
              <span class="calendar-task-title">${task.completed ? "✓ " : ""}${escapeHtml(getTaskSubjectName(task))} / ${escapeHtml(task.title)}</span>
              <span class="calendar-task-meta">優先度 ${priorityLabel(task.priority)}${task.completed ? "・完了" : ""}</span>
            </button>
          `).join("");

        html += `
          <div class="calendar-day ${dateString === todayString ? "today" : ""}">
            <div class="date-number">
              <span>${day}</span>
              ${dateString === todayString ? "<span class='today-label'>今日</span>" : ""}
            </div>
            ${taskButtons}
          </div>
        `;
      }

      return { html, monthTasks, unfinished };
    }

    function toggleMobileCalendar() {
      isMobileCalendarOpen = !isMobileCalendarOpen;
      const panel = document.getElementById("mobileCalendarPanel");
      const button = document.getElementById("mobileCalendarToggle");
      panel.classList.toggle("hidden", !isMobileCalendarOpen);
      panel.setAttribute("aria-hidden", String(!isMobileCalendarOpen));
      button.textContent = isMobileCalendarOpen ? "月カレンダーを閉じる" : "月カレンダーを見る";
      if (isMobileCalendarOpen) renderMobileCalendar();
    }

    function moveMobileCalendarMonth(offset) {
      if (offset === 0) {
        visibleMobileCalendarYear = new Date().getFullYear();
        visibleMobileCalendarMonth = new Date().getMonth();
      } else {
        const next = new Date(visibleMobileCalendarYear, visibleMobileCalendarMonth + offset, 1);
        visibleMobileCalendarYear = next.getFullYear();
        visibleMobileCalendarMonth = next.getMonth();
      }

      renderMobileCalendar();
    }

    function renderMobileCalendar() {
      const title = document.getElementById("mobileCalendarTitle");
      const grid = document.getElementById("mobileCalendarGrid");
      if (!title || !grid) return;

      const { html, monthTasks, unfinished } = renderCalendarGridFor(visibleMobileCalendarYear, visibleMobileCalendarMonth);
      title.textContent = `${visibleMobileCalendarYear}年 ${visibleMobileCalendarMonth + 1}月`;
      document.getElementById("mobileCalendarMonthCount").textContent = `${monthTasks.length}件`;
      document.getElementById("mobileCalendarMonthUnfinished").textContent = `${unfinished.length}件`;
      document.getElementById("mobileCalendarMonthOverdue").textContent = "0件";
      grid.innerHTML = html;
    }

    function renderAll() {
      if (isTaskAccessReady()) removeExpiredTasks();
      renderSubjectManager();
      renderTemplateManager();
      renderSubjectOptions();
      renderTemplateOptions();
      renderTodayFocus();
      renderSevenDayTasks();
      renderTasks();
      renderCalendar();
      renderMobileCalendar();
      updateTaskFormPanel();
      updateInteractiveState();
    }

    resetTaskForm();
    renderAll();

    if ("serviceWorker" in navigator) {
      let isReloadingAfterSwUpdate = false;

      navigator.serviceWorker.addEventListener("controllerchange", () => {
        if (isReloadingAfterSwUpdate) return;
        isReloadingAfterSwUpdate = true;
        window.location.reload();
      });

      window.addEventListener("load", () => {
        navigator.serviceWorker.register("./service-worker.js?v=12", { updateViaCache: "none" })
          .then(registration => registration.update())
          .catch(error => console.warn("Service Worker registration failed:", error));
      });
    }
  </script>
</body>
</html>
